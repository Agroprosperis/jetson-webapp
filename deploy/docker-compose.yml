services:
  tilletia-app-mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: tilletia-app-mediamtx
    network_mode: host
    restart: unless-stopped
    volumes:
      - ${MEDIAMTX_CONFIG_PATH:-/etc/tilletia-app/mediamtx.yml}:/mediamtx.yml:ro

  tilletia-app:
    image: tilletia-app:latest
    container_name: tilletia-app
    build:
      context: ..
      dockerfile: docker/Dockerfile.desktop
    network_mode: host
    restart: unless-stopped
    runtime: nvidia
    privileged: true
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GRID_LINEA_CONFIG=${GRID_LINEA_CONFIG:-/opt/linea/configs/linea/linea_hgnetv2_s.py}
      - GRID_LINEA_CHECKPOINT=${GRID_LINEA_CHECKPOINT:-/opt/linea/weights/linea_hgnetv2_s.pth}
    volumes:
      - /dev:/dev
      - ${TILLETIA_DATA_ROOT:-/var/lib/tilletia-app}/model:/app/model
      - ${TILLETIA_DATA_ROOT:-/var/lib/tilletia-app}/output_hq:/app/output_hq
      - ${TILLETIA_DATA_ROOT:-/var/lib/tilletia-app}/runs:/app/runs
