---
- name: Install Tilletia on Ubuntu hosts
  hosts: tilletia
  gather_facts: yes

  vars:
    deploy_dir: "{{ playbook_dir | dirname }}"

  tasks:
    - name: Require Ubuntu 24.04 noble
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == 'Ubuntu'
          - ansible_facts['distribution_version'] is version(expected_ubuntu_version, '==')
          - ansible_facts['distribution_release'] == expected_ubuntu_codename
        fail_msg: >-
          {{ inventory_hostname }} must run Ubuntu {{ expected_ubuntu_version }}
          ({{ expected_ubuntu_codename }}), got
          {{ ansible_facts['distribution'] | default('unknown') }}
          {{ ansible_facts['distribution_version'] | default('') }}
          ({{ ansible_facts['distribution_release'] | default('') }}).

    - name: Copy bootstrap script
      become: yes
      ansible.builtin.copy:
        src: "{{ deploy_dir }}/bootstrap-ubuntu.sh"
        dest: /tmp/tilletia-bootstrap-ubuntu.sh
        mode: "0755"

    - name: Run bootstrap detached (docker, nvidia toolkit, clone, install)
      become: yes
      ansible.builtin.shell:
        cmd: >-
          REPO_URL='{{ repo_url }}'
          INSTALL_DIR='{{ install_dir }}'
          REQUIRED_CODENAME='{{ expected_ubuntu_codename }}'
          SKIP_NVIDIA='{{ skip_nvidia | default("0") }}'
          SKIP_INSTALL='{{ skip_install | default("0") }}'
          nohup /tmp/tilletia-bootstrap-ubuntu.sh
          > /tmp/tilletia-install.log 2>&1 &
      changed_when: true

    - name: Bootstrap launched
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} ({{ ansible_host }}): install running in
          background. Log: /tmp/tilletia-install.log . Build takes ~40+ min
          (4.27GB base image + OpenCV compile). Verify later with check.yml.
