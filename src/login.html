<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Tilletia Login</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #111;
  color: #eee;
  font-family: system-ui, Segoe UI, Roboto, Arial;
}
.card {
  width: min(360px, calc(100vw - 32px));
  background: #1b1b1b;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 20px;
  box-sizing: border-box;
}
h1 {
  margin: 0 0 16px;
  font-size: 22px;
  font-weight: 500;
}
label {
  display: block;
  font-size: 13px;
  color: #aaa;
  margin-bottom: 6px;
}
input, button {
  width: 100%;
  box-sizing: border-box;
  border-radius: 8px;
  border: 1px solid #333;
  background: #222;
  color: #eee;
  padding: 10px 12px;
  font-size: 14px;
}
input { margin-bottom: 14px; }
button {
  background: #2563eb;
  border-color: #1d4ed8;
  cursor: pointer;
}
button:hover { background: #1d4ed8; }
#error {
  min-height: 20px;
  margin-top: 12px;
  color: #f87171;
  font-size: 13px;
}
.hint {
  margin-top: 14px;
  color: #777;
  font-size: 12px;
}
.hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Tilletia App</h1>
  <form id="loginForm">
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />

    <button type="submit">Увійти</button>
    <div id="error"></div>
  </form>
  <form id="changePasswordForm" class="hidden">
    <label for="newLoginPassword">New Password</label>
    <input id="newLoginPassword" name="newLoginPassword" type="password" autocomplete="new-password" required />

    <label for="confirmLoginPassword">Confirm Password</label>
    <input id="confirmLoginPassword" name="confirmLoginPassword" type="password" autocomplete="new-password" required />

    <button type="submit">Змінити пароль</button>
  </form>
</div>

<script>
let pendingUsername = '';
let pendingPassword = '';

document.getElementById('loginForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  errorEl.textContent = '';

  try {
    const response = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      if (response.status === 403 && data.password_change_required) {
        pendingUsername = username;
        pendingPassword = password;
        document.getElementById('changePasswordForm').classList.remove('hidden');
        errorEl.textContent = 'Password change required before first login.';
        return;
      }
      throw new Error(data.error || 'Login failed');
    }
    window.location.href = '/';
  } catch (error) {
    errorEl.textContent = error.message || 'Login failed';
  }
});

document.getElementById('changePasswordForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const newPassword = document.getElementById('newLoginPassword').value;
  const confirmPassword = document.getElementById('confirmLoginPassword').value;
  const errorEl = document.getElementById('error');
  errorEl.textContent = '';

  if (newPassword !== confirmPassword) {
    errorEl.textContent = 'Passwords do not match.';
    return;
  }

  try {
    const response = await fetch('/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: pendingUsername,
        current_password: pendingPassword,
        new_password: newPassword,
        confirm_password: confirmPassword,
      }),
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(data.error || 'Password change failed');
    }

    const loginResponse = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: pendingUsername, password: newPassword }),
    });
    const loginData = await loginResponse.json().catch(() => ({}));
    if (!loginResponse.ok) {
      throw new Error(loginData.error || 'Login failed');
    }
    window.location.href = '/';
  } catch (error) {
    errorEl.textContent = error.message || 'Password change failed';
  }
});
</script>
</body>
</html>
