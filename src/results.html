<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'/>
<title>Analysis Results</title>
<meta name='viewport' content='width=device-width,initial-scale=1'/>
<link rel="stylesheet" href="/vendor/glightbox/glightbox.min.css" />
<link rel="stylesheet" href="/vendor/sweetalert2/sweetalert2.min.css" />
<style>
body { margin:0; background:#111; color:#eee; font-family:system-ui, Segoe UI, Roboto, Arial; padding: 20px; }
h1 { margin-bottom: 20px; font-weight: 300; }
table { width: 100%; border-collapse: collapse; background: #222; border-radius: 8px; overflow: hidden; }
table { min-width: 980px; }
th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #333; }
th { background: #1b1b1b; font-weight: 600; color: #aaa; text-transform: uppercase; font-size: 12px; }
tr:last-child td { border-bottom: none; }
tr:hover { background: #2a2a2a; }
a { color: #3b82f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.btn-del {
    background: #ef4444; color: white; border: none; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
}
.btn-del:hover { background: #dc2626; }
.btn-download {
    background: #2563eb; color: white; border: none; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
}
.btn-download:hover { background: #1d4ed8; }
.btn-process {
    background: #16a34a; color: white; border: none; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
}
.btn-process:hover { background: #15803d; }
.empty { padding: 20px; text-align: center; color: #777; font-style: italic; }
.back-link { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 14px;}
.back-link:hover { color: #eee; }
.folder-row td { background: #191919; font-weight: 600; color: #cfcfcf; }
.folder-line { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.folder-meta { color: #888; font-weight: 400; font-size: 12px; }
.file-row td { padding-left: 28px; }
.file-row { display: none; }
.file-row.is-visible { display: table-row; }
.gallery-row { display: none; }
.gallery-row.is-visible { display: table-row; }
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 8px 0; }
.gallery img { width: 100%; height: 90px; object-fit: cover; border-radius: 4px; border: 1px solid #333; }
.gallery-empty { color: #777; font-style: italic; padding: 8px 0; }
.folder-toggle { cursor: pointer; }
.folder-caret { color: #888; margin-right: 8px; }
.file-type { color: #888; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; }
.toolbar { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:16px; }
.toolbar label { display:flex; flex-direction:column; gap:6px; color:#aaa; font-size:12px; }
.toolbar input, .toolbar button {
    background:#222; color:#eee; border:1px solid #333; border-radius:6px; padding:8px 10px; font-size:13px;
}
.toolbar button { cursor:pointer; }
.toolbar button:hover { background:#2a2a2a; }
.file-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.metric-cell { white-space: nowrap; color: #ddd; }
.table-wrap { overflow-x: auto; }
</style>
</head>
<body>

<a href="/" class="back-link">← Back to Dashboard</a>

<h1>Analysis Results</h1>

<div class="toolbar">
    <label>
        Date
        <input id="dateFilter" type="date" />
    </label>
    <button id="applyFilters" type="button">Apply Filter</button>
    <button id="clearFilters" type="button">Clear</button>
</div>

<div id="loading">Loading...</div>

<div class="table-wrap">
    <table id="resultsTable" style="display:none;">
        <thead>
            <tr>
                <th>Folder / File</th>
                {% if can_view_result_owners %}<th>Owner</th>{% endif %}
                <th>Duration</th>
                <th>Detected Objects</th>
                <th>S-values</th>
                <th>Type</th>
                <th>Size</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>
</div>

<script src="/auth-client.js"></script>
<script>
const CAN_DELETE_RESULTS = {{ 'true' if can_delete_results else 'false' }};
const CAN_CONFIGURE_DASHBOARD = {{ 'true' if can_configure_dashboard else 'false' }};
const SHOW_OWNER_COLUMN = {{ 'true' if can_view_result_owners else 'false' }};

function formatIntegerMetric(value) {
    return value === null || value === undefined || value === '' ? '-' : value;
}

function formatClassCounts(classCounts) {
    if (!classCounts || typeof classCounts !== 'object') return '-';
    const parts = Object.entries(classCounts).map(([name, count]) => `${name}: ${count}`);
    return parts.length ? parts.join(' | ') : '-';
}

function formatDecimalMetric(value, decimals = 1) {
    if (value === null || value === undefined || value === '') return '-';
    const numberValue = Number(value);
    return Number.isFinite(numberValue) ? numberValue.toFixed(decimals) : '-';
}

function formatSValues(sValues) {
    if (sValues && typeof sValues === 'object') {
        const parts = Object.entries(sValues).map(([name, value]) => `${name}: ${formatDecimalMetric(value)}`);
        if (parts.length) return parts.join(' | ');
    }
    return '-';
}

function buildResultsUrl() {
    const params = new URLSearchParams();
    const selectedDate = document.getElementById('dateFilter').value;
    if (selectedDate) params.set('date', selectedDate);
    const query = params.toString();
    return query ? `/api/results?${query}` : '/api/results';
}

async function loadResults() {
    try {
        const loading = document.getElementById('loading');
        const table = document.getElementById('resultsTable');
        loading.style.display = 'block';
        loading.textContent = 'Loading...';
        table.style.display = 'none';
        const res = await fetch(buildResultsUrl());
        const data = await res.json();
        
        const tbody = document.getElementById('resultsBody');
        document.querySelectorAll('.empty[data-results-empty="1"]').forEach(el => el.remove());
        
        loading.style.display = 'none';
        tbody.innerHTML = '';

        if (!res.ok) {
            throw new Error(data.error || 'Failed to load results.');
        }

        if (!data.results || data.results.length === 0) {
            table.style.display = 'none';
            const msg = document.createElement('div');
            msg.className = 'empty';
            msg.setAttribute('data-results-empty', '1');
            msg.textContent = 'No analysis results found for the selected date.';
            document.body.appendChild(msg);
            return;
        }

        table.style.display = 'table';

        data.results.forEach(item => {
            const folderRow = document.createElement('tr');
            folderRow.className = 'folder-row';
            folderRow.dataset.folder = item.id;
            const deleteButton = CAN_DELETE_RESULTS
                ? `<button class="btn-del" onclick="deleteResult('${item.id}')">Remove</button>`
                : '';
            const ownerCell = SHOW_OWNER_COLUMN ? `<td>${item.owner_username || '-'}</td>` : '';
            folderRow.innerHTML = `
                <td>
                    <div class="folder-line folder-toggle">
                        <span style="font-family:monospace;"><span class="folder-caret">▸</span>${item.id}</span>
                        <span class="folder-meta">${item.timestamp}</span>
                    </div>
                </td>
                ${ownerCell}
                <td class="metric-cell">${item.duration || '-'}</td>
                <td class="metric-cell">${formatClassCounts(item.class_counts)}</td>
                <td class="metric-cell">${formatSValues(item.s_values)}</td>
                <td class="file-type">folder</td>
                <td>-</td>
                <td>
                    <button class="btn-download" onclick="downloadResultZip('${item.id}')">Download ZIP</button>
                    ${deleteButton}
                </td>
            `;
            tbody.appendChild(folderRow);

            const imageFiles = (item.files || []).filter(file => {
                const ext = (file.name || '').split('.').pop().toLowerCase();
                return ext === 'jpg' || ext === 'jpeg' || ext === 'png';
            });
            const galleryRow = document.createElement('tr');
            galleryRow.className = 'gallery-row';
            galleryRow.dataset.folder = item.id;
            const galleryItems = imageFiles.length === 0
                ? '<div class="gallery-empty">No screenshots</div>'
                : imageFiles.map(file => {
                    const fileUrl = `/download/${encodeURI(file.path)}`;
                    return `<a class="gallery-link" href="${fileUrl}" data-gallery="run-${item.id}"><img src="${fileUrl}" loading="lazy" alt="${file.name}" /></a>`;
                }).join('');
            galleryRow.innerHTML = `<td colspan="${SHOW_OWNER_COLUMN ? 8 : 7}"><div class="gallery">${galleryItems}</div></td>`;
            tbody.appendChild(galleryRow);

            (item.files || []).forEach(file => {
                const tr = document.createElement('tr');
                tr.className = 'file-row';
                tr.dataset.folder = item.id;
                const ext = (file.name || '').split('.').pop().toLowerCase();
                let typeLabel = 'file';
                if (ext === 'mkv') typeLabel = 'video';
                else if (ext === 'csv') typeLabel = 'csv';
                else if (ext === 'jpg' || ext === 'jpeg') typeLabel = 'image';

                const fileUrl = `/download/${encodeURI(file.path)}`;
                const fileOwnerCell = SHOW_OWNER_COLUMN ? '<td></td>' : '';
                const processButton = CAN_CONFIGURE_DASHBOARD && typeLabel === 'video'
                    ? `<button type="button" class="btn-process" onclick='processResultVideo(${JSON.stringify(item.id)}, ${JSON.stringify(file.path)})'>Process</button>`
                    : '';
                tr.innerHTML = `
                    <td>${file.name}</td>
                    ${fileOwnerCell}
                    <td></td>
                    <td></td>
                    <td></td>
                    <td class="file-type">${typeLabel}</td>
                    <td>${file.size || '-'}</td>
                    <td>
                        <div class="file-actions">
                            <a href="${fileUrl}" download>Download</a>
                            ${processButton}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            folderRow.addEventListener('click', (event) => {
                if (event.target && event.target.closest('button')) return;
                const rows = document.querySelectorAll(
                    `.file-row[data-folder="${item.id}"], .gallery-row[data-folder="${item.id}"]`
                );
                const caret = folderRow.querySelector('.folder-caret');
                const isVisible = rows.length > 0 && rows[0].classList.contains('is-visible');
                rows.forEach(row => row.classList.toggle('is-visible', !isVisible));
                if (caret) caret.textContent = isVisible ? '▸' : '▾';
            });
        });

        if (window.GLightbox) {
            GLightbox({ selector: '.gallery-link' });
        }

    } catch(e) {
        document.getElementById('loading').textContent = `Error loading results: ${e.message}`;
        console.error(e);
    }
}

async function processResultVideo(pid, filePath) {
    try {
        if (window.Swal) {
            Swal.fire({
                title: 'Preparing video',
                text: 'Using the existing result video as a new file source...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading(),
            });
        }

        const res = await fetch(`/api/results/${encodeURIComponent(pid)}/process-source`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: filePath || '' }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
            throw new Error(data.error || 'Failed to prepare result video.');
        }

        window.location.href = '/';
    } catch (e) {
        if (window.Swal) {
            Swal.fire({ icon: 'error', title: 'Process failed', text: e.message });
        } else {
            alert(`Failed to prepare result video: ${e.message}`);
        }
    }
}

async function deleteResult(pid) {
    if(!confirm(`Are you sure you want to delete analysis "${pid}"? This cannot be undone.`)) return;

    try {
        const res = await fetch(`/api/results/${pid}`, { method: 'DELETE' });
        const j = await res.json();
        
        if (j.success) {
            const rows = document.querySelectorAll(`[data-folder="${pid}"]`);
            rows.forEach(row => row.remove());

            const tbody = document.getElementById('resultsBody');
            if (tbody.children.length === 0) location.reload();
        } else {
            alert("Error: " + (j.error || "Unknown error"));
        }
    } catch(e) {
        alert("Failed to delete: " + e);
    }
}

async function downloadResultZip(pid) {
    try {
        if (window.Swal) {
            Swal.fire({
                title: 'Preparing download',
                text: 'Creating ZIP file...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading(),
            });
        }

        const res = await fetch(`/api/results/${encodeURIComponent(pid)}/download`);
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || 'Failed to download');
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${pid}.zip`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);

        if (window.Swal) {
            Swal.close();
        }
    } catch (e) {
        if (window.Swal) {
            Swal.fire({ icon: 'error', title: 'Download failed', text: e.message });
        } else {
            alert("Failed to download: " + e.message);
        }
    }
}

document.getElementById('applyFilters').addEventListener('click', loadResults);
document.getElementById('clearFilters').addEventListener('click', () => {
    document.getElementById('dateFilter').value = '';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').textContent = 'Loading...';
    loadResults();
});

window.onload = loadResults;
</script>
<script src="/vendor/glightbox/glightbox.min.js"></script>
<script src="/vendor/sweetalert2/sweetalert2.min.js"></script>

</body>
</html>
