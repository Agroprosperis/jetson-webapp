<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'/>
<title>Результати аналізів</title>
<meta name='viewport' content='width=device-width,initial-scale=1'/>
<link rel="stylesheet" href="/vendor/glightbox/glightbox.min.css" />
<link rel="stylesheet" href="/vendor/sweetalert2/sweetalert2.min.css" />
<style>
body { margin:0; background:#111; color:#eee; font-family:system-ui, Segoe UI, Roboto, Arial; padding: 20px; }
h1 { margin-bottom: 20px; font-weight: 300; }
table { width: 100%; border-collapse: collapse; background: #222; border-radius: 8px; overflow: hidden; }
table { min-width: 980px; }
th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #333; }
th { background: #1b1b1b; font-weight: 600; color: #aaa; text-transform: uppercase; font-size: 12px; position: sticky; top: 0; z-index: 2; }
tr:last-child td { border-bottom: none; }
tr:hover { background: #2a2a2a; }
a { color: #3b82f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.btn-del {
    background: transparent; color: #ef4444; border: 1px solid transparent;
    padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 16px; line-height: 1;
    margin-left: auto;
}
.btn-del:hover { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; }
.actions-cell { display: flex; align-items: center; gap: 8px; }
.btn-download {
    background: #2563eb; color: white; border: none; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
}
.btn-download:hover { background: #1d4ed8; }
.btn-process {
    background: #16a34a; color: white; border: none; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
}
.btn-process:hover { background: #15803d; }
.btn-manual {
    background: #7c3aed; color: white; border: none; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
}
.btn-manual:hover { background: #6d28d9; }
.empty { padding: 20px; text-align: center; color: #777; font-style: italic; }
.back-link { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 14px;}
.back-link:hover { color: #eee; }
.folder-row td { background: #191919; font-weight: 600; color: #cfcfcf; }
.folder-line { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.folder-meta { color: #888; font-weight: 400; font-size: 12px; }
.file-row td { padding-left: 28px; }
.file-row { display: none; }
.file-row.is-visible { display: table-row; }
.gallery-row { display: none; }
.gallery-row.is-visible { display: table-row; }
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 8px 0; }
.gallery img { width: 100%; height: 90px; object-fit: cover; border-radius: 4px; border: 1px solid #333; }
.gallery-empty { color: #777; font-style: italic; padding: 8px 0; }
.folder-toggle { cursor: pointer; }
.folder-caret { color: #888; margin-right: 8px; }
.file-type { color: #888; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; }
.toolbar { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:16px; }
.toolbar label { display:flex; flex-direction:column; gap:6px; color:#aaa; font-size:12px; }
.toolbar input, .toolbar button {
    background:#222; color:#eee; border:1px solid #333; border-radius:6px; padding:8px 10px; font-size:13px;
}
.toolbar button { cursor:pointer; }
.toolbar button:hover { background:#2a2a2a; }
.file-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.metric-cell { white-space: nowrap; color: #ddd; }
.metric-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.metric-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 999px;
    padding: 2px 10px; font-size: 12px; white-space: nowrap;
}
.metric-badge .badge-name { color: #999; }
.metric-badge .badge-value { color: #eee; font-weight: 600; }
.results-count { color: #888; font-size: 13px; align-self: center; margin-left: auto; }
.table-wrap { overflow: auto; max-height: calc(100vh - 230px); }
</style>
</head>
<body>

<a href="/" class="back-link">← Назад до панелі</a>

<h1>Результати аналізів</h1>

<div class="toolbar">
    <label>
        Дата
        <input id="dateFilter" type="date" />
    </label>
    <label>
        Номер аналізу
        <input id="analysisNumberFilter" type="text" placeholder="містить" />
    </label>
    <button id="applyFilters" type="button">Застосувати</button>
    <button id="clearFilters" type="button">Очистити</button>
    <button id="toggleAllBtn" type="button" style="display:none;">Розгорнути все</button>
    <span id="resultsCount" class="results-count"></span>
</div>

<div id="loading">Завантаження...</div>

<div class="table-wrap">
    <table id="resultsTable" style="display:none;">
        <thead>
            <tr>
                <th>Папка / Файл</th>
                {% if can_view_result_owners %}<th>Власник</th>{% endif %}
                <th>Тривалість</th>
                <th>Виявлені об'єкти</th>
                <th>S-значення</th>
                <th>Факт. спори</th>
                <th>Тип</th>
                <th>Розмір</th>
                <th>Дії</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>
</div>

<script src="/auth-client.js"></script>
<script>
const CAN_DELETE_RESULTS = {{ 'true' if can_delete_results else 'false' }};
const CAN_CONFIGURE_DASHBOARD = {{ 'true' if can_configure_dashboard else 'false' }};
const SHOW_OWNER_COLUMN = {{ 'true' if can_view_result_owners else 'false' }};

function formatIntegerMetric(value) {
    return value === null || value === undefined || value === '' ? '-' : value;
}

function renderMetricBadges(entries) {
    if (!entries.length) return '-';
    const badges = entries.map(([name, value]) =>
        `<span class="metric-badge"><span class="badge-name">${name}</span><span class="badge-value">${value}</span></span>`
    ).join('');
    return `<div class="metric-badges">${badges}</div>`;
}

function formatDetectedObjectsPerClass(detectedObjectsPerClass) {
    if (!detectedObjectsPerClass || typeof detectedObjectsPerClass !== 'object') return '-';
    return renderMetricBadges(Object.entries(detectedObjectsPerClass));
}

function formatDecimalMetric(value, decimals = 1) {
    if (value === null || value === undefined || value === '') return '-';
    const numberValue = Number(value);
    return Number.isFinite(numberValue) ? numberValue.toFixed(decimals) : '-';
}

function formatManualSporeCount(manualSporeCountPerClass) {
    if (!manualSporeCountPerClass || typeof manualSporeCountPerClass !== 'object') return '-';
    return renderMetricBadges(Object.entries(manualSporeCountPerClass));
}

function formatSValuePerClass(sValuePerClass) {
    if (sValuePerClass && typeof sValuePerClass === 'object') {
        const entries = Object.entries(sValuePerClass).map(([name, value]) => [name, formatDecimalMetric(value)]);
        if (entries.length) return renderMetricBadges(entries);
    }
    return '-';
}

function updateResultsCount(count) {
    const el = document.getElementById('resultsCount');
    el.textContent = count > 0 ? `Знайдено аналізів: ${count}` : '';
    const toggleBtn = document.getElementById('toggleAllBtn');
    toggleBtn.style.display = count > 0 ? '' : 'none';
    toggleBtn.textContent = 'Розгорнути все';
}

function setAllFoldersExpanded(expanded) {
    document.querySelectorAll('.file-row, .gallery-row').forEach(row => {
        row.classList.toggle('is-visible', expanded);
    });
    document.querySelectorAll('.folder-row .folder-caret').forEach(caret => {
        caret.textContent = expanded ? '▾' : '▸';
    });
}

function buildResultsUrl() {
    const params = new URLSearchParams();
    const selectedDate = document.getElementById('dateFilter').value;
    const analysisNumber = document.getElementById('analysisNumberFilter').value.trim();
    if (selectedDate) params.set('date', selectedDate);
    if (analysisNumber) params.set('analysis_number', analysisNumber);
    const query = params.toString();
    return query ? `/api/v2/results?${query}` : '/api/v2/results';
}

async function loadResults() {
    try {
        const loading = document.getElementById('loading');
        const table = document.getElementById('resultsTable');
        loading.style.display = 'block';
        loading.textContent = 'Завантаження...';
        table.style.display = 'none';
        const res = await fetch(buildResultsUrl());
        const data = await res.json();
        
        const tbody = document.getElementById('resultsBody');
        document.querySelectorAll('.empty[data-results-empty="1"]').forEach(el => el.remove());
        
        loading.style.display = 'none';
        tbody.innerHTML = '';

        if (!res.ok) {
            throw new Error(data.error || 'Не вдалося завантажити результати.');
        }

        if (!data.results || data.results.length === 0) {
            table.style.display = 'none';
            updateResultsCount(0);
            const msg = document.createElement('div');
            msg.className = 'empty';
            msg.setAttribute('data-results-empty', '1');
            msg.textContent = 'Аналізів за вибраними фільтрами не знайдено.';
            document.body.appendChild(msg);
            return;
        }

        updateResultsCount(data.results.length);

        table.style.display = 'table';

        data.results.forEach(item => {
            const folderRow = document.createElement('tr');
            folderRow.className = 'folder-row';
            folderRow.dataset.folder = item.id;
            const deleteButton = CAN_DELETE_RESULTS
                ? `<button class="btn-del" title="Видалити" aria-label="Видалити" onclick="deleteResult('${item.id}')">🗑</button>`
                : '';
            const ownerCell = SHOW_OWNER_COLUMN ? `<td>${item.owner_username || '-'}</td>` : '';
            folderRow.innerHTML = `
                <td>
                    <div class="folder-line folder-toggle">
                        <span style="font-family:monospace;"><span class="folder-caret">▸</span>${item.id}</span>
                        <span class="folder-meta">${item.timestamp}</span>
                    </div>
                </td>
                ${ownerCell}
                <td class="metric-cell">${item.duration || '-'}</td>
                <td class="metric-cell">${formatDetectedObjectsPerClass(item.detected_objects_per_class)}</td>
                <td class="metric-cell">${formatSValuePerClass(item.s_value_per_class)}</td>
                <td class="metric-cell">${formatManualSporeCount(item.manual_spore_count_per_class)}</td>
                <td class="file-type">папка</td>
                <td>-</td>
                <td>
                    <div class="actions-cell">
                        <button class="btn-manual" data-manual-id="${item.id}">Внести факт</button>
                        <button class="btn-download" onclick="downloadResultZip('${item.id}')">Завантажити ZIP</button>
                        ${deleteButton}
                    </div>
                </td>
            `;
            tbody.appendChild(folderRow);

            const manualButton = folderRow.querySelector('.btn-manual');
            if (manualButton) {
                manualButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    editManualSporeCount(
                        item.id,
                        item.detected_objects_per_class || {},
                        item.manual_spore_count_per_class || {}
                    );
                });
            }

            const imageFiles = (item.files || []).filter(file => {
                const ext = (file.name || '').split('.').pop().toLowerCase();
                return ext === 'jpg' || ext === 'jpeg' || ext === 'png';
            });
            const galleryRow = document.createElement('tr');
            galleryRow.className = 'gallery-row';
            galleryRow.dataset.folder = item.id;
            const galleryItems = imageFiles.length === 0
                ? '<div class="gallery-empty">Немає знімків</div>'
                : imageFiles.map(file => {
                    const fileUrl = `/download/${encodeURI(file.path)}`;
                    return `<a class="gallery-link" href="${fileUrl}" data-gallery="run-${item.id}"><img src="${fileUrl}" loading="lazy" alt="${file.name}" /></a>`;
                }).join('');
            galleryRow.innerHTML = `<td colspan="${SHOW_OWNER_COLUMN ? 9 : 8}"><div class="gallery">${galleryItems}</div></td>`;
            tbody.appendChild(galleryRow);

            (item.files || []).forEach(file => {
                const tr = document.createElement('tr');
                tr.className = 'file-row';
                tr.dataset.folder = item.id;
                const ext = (file.name || '').split('.').pop().toLowerCase();
                let typeLabel = 'файл';
                if (ext === 'mkv') typeLabel = 'відео';
                else if (ext === 'csv') typeLabel = 'csv';
                else if (ext === 'jpg' || ext === 'jpeg') typeLabel = 'зображення';

                const fileUrl = `/download/${encodeURI(file.path)}`;
                const fileOwnerCell = SHOW_OWNER_COLUMN ? '<td></td>' : '';
                const processButton = CAN_CONFIGURE_DASHBOARD && ext === 'mkv'
                    ? `<button type="button" class="btn-process" onclick='processResultVideo(${JSON.stringify(item.id)}, ${JSON.stringify(file.path)})'>Обробити</button>`
                    : '';
                tr.innerHTML = `
                    <td>${file.name}</td>
                    ${fileOwnerCell}
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td class="file-type">${typeLabel}</td>
                    <td>${file.size || '-'}</td>
                    <td>
                        <div class="file-actions">
                            <a href="${fileUrl}" download>Завантажити</a>
                            ${processButton}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            folderRow.addEventListener('click', (event) => {
                if (event.target && event.target.closest('button')) return;
                const rows = document.querySelectorAll(
                    `.file-row[data-folder="${item.id}"], .gallery-row[data-folder="${item.id}"]`
                );
                const caret = folderRow.querySelector('.folder-caret');
                const isVisible = rows.length > 0 && rows[0].classList.contains('is-visible');
                rows.forEach(row => row.classList.toggle('is-visible', !isVisible));
                if (caret) caret.textContent = isVisible ? '▸' : '▾';
            });
        });

        if (window.GLightbox) {
            GLightbox({ selector: '.gallery-link' });
        }

    } catch(e) {
        document.getElementById('loading').textContent = `Помилка завантаження результатів: ${e.message}`;
        console.error(e);
    }
}

async function processResultVideo(pid, filePath) {
    try {
        if (window.Swal) {
            Swal.fire({
                title: 'Підготовка відео',
                text: 'Використовуємо наявне відео результату як нове джерело...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading(),
            });
        }

        const res = await fetch(`/api/results/${encodeURIComponent(pid)}/process-source`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: filePath || '' }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
            throw new Error(data.error || 'Не вдалося підготувати відео результату.');
        }

        window.location.href = '/';
    } catch (e) {
        if (window.Swal) {
            Swal.fire({ icon: 'error', title: 'Помилка обробки', text: e.message });
        } else {
            alert(`Не вдалося підготувати відео: ${e.message}`);
        }
    }
}

async function deleteResult(pid) {
    if (window.Swal) {
        const confirmation = await Swal.fire({
            icon: 'warning',
            title: 'Видалити аналіз?',
            text: `Аналіз "${pid}" буде видалено назавжди. Цю дію не можна скасувати.`,
            showCancelButton: true,
            confirmButtonText: 'Видалити',
            cancelButtonText: 'Скасувати',
            confirmButtonColor: '#ef4444',
        });
        if (!confirmation.isConfirmed) return;
    } else if (!confirm(`Видалити аналіз "${pid}"? Цю дію не можна скасувати.`)) {
        return;
    }

    try {
        const res = await fetch(`/api/results/${pid}`, { method: 'DELETE' });
        const j = await res.json();
        
        if (j.success) {
            const rows = document.querySelectorAll(`[data-folder="${pid}"]`);
            rows.forEach(row => row.remove());

            const tbody = document.getElementById('resultsBody');
            if (tbody.children.length === 0) location.reload();
        } else if (window.Swal) {
            Swal.fire({ icon: 'error', title: 'Помилка видалення', text: j.error || 'Невідома помилка' });
        } else {
            alert("Помилка: " + (j.error || "Невідома помилка"));
        }
    } catch(e) {
        if (window.Swal) {
            Swal.fire({ icon: 'error', title: 'Помилка видалення', text: String(e) });
        } else {
            alert("Не вдалося видалити: " + e);
        }
    }
}

async function downloadResultZip(pid) {
    try {
        if (window.Swal) {
            Swal.fire({
                title: 'Підготовка завантаження',
                text: 'Створюємо ZIP-файл...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading(),
            });
        }

        const res = await fetch(`/api/results/${encodeURIComponent(pid)}/download`);
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || 'Не вдалося завантажити');
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${pid}.zip`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);

        if (window.Swal) {
            Swal.close();
        }
    } catch (e) {
        if (window.Swal) {
            Swal.fire({ icon: 'error', title: 'Помилка завантаження', text: e.message });
        } else {
            alert("Не вдалося завантажити: " + e.message);
        }
    }
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
}

async function editManualSporeCount(pid, aiCounts, manualCounts) {
    if (!window.Swal) return;

    const classNames = Array.from(new Set([
        ...Object.keys(aiCounts || {}),
        ...Object.keys(manualCounts || {}),
    ]));
    const fields = classNames.length ? classNames : ['Разом'];

    const rowsHtml = fields.map((name, idx) => {
        const hasAi = Object.prototype.hasOwnProperty.call(aiCounts || {}, name);
        const aiHint = hasAi ? ` <span style="color:#888;font-size:12px;">(ШІ: ${aiCounts[name]})</span>` : '';
        const existing = (manualCounts && manualCounts[name] != null) ? manualCounts[name] : '';
        return `
            <div style="display:flex; align-items:center; gap:10px; margin:6px 0;">
                <label style="flex:1; text-align:left;">${escapeHtml(name)}${aiHint}</label>
                <input type="number" min="0" step="1" data-class="${escapeHtml(name)}" value="${existing}"
                       style="width:120px; padding:6px 8px; border-radius:6px; border:1px solid #444; background:#1a1a1a; color:#eee;" />
            </div>`;
    }).join('');

    const result = await Swal.fire({
        title: 'Фактична кількість спор',
        html: `<div style="text-align:left;">Кількість спор сажки, порахована вручну:</div>${rowsHtml}`,
        showCancelButton: true,
        confirmButtonText: 'Зберегти',
        cancelButtonText: 'Скасувати',
        focusConfirm: false,
        preConfirm: () => {
            const counts = {};
            document.querySelectorAll('[data-class]').forEach((input) => {
                const raw = input.value.trim();
                if (raw === '') return;
                const num = parseInt(raw, 10);
                if (Number.isFinite(num) && num >= 0) {
                    counts[input.getAttribute('data-class')] = num;
                }
            });
            return counts;
        },
    });

    if (!result.isConfirmed) return;

    try {
        const res = await fetch(`/api/results/${encodeURIComponent(pid)}/manual-count`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ manual_spore_count_per_class: result.value || {} }),
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || res.status);
        }
        loadResults();
    } catch (e) {
        console.error(e);
        Swal.fire({ icon: 'error', title: 'Помилка збереження', text: String(e.message || e) });
    }
}

document.getElementById('applyFilters').addEventListener('click', loadResults);
document.getElementById('clearFilters').addEventListener('click', () => {
    document.getElementById('dateFilter').value = '';
    document.getElementById('analysisNumberFilter').value = '';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').textContent = 'Завантаження...';
    loadResults();
});

['dateFilter', 'analysisNumberFilter'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') {
            ev.preventDefault();
            loadResults();
        }
    });
});

document.getElementById('toggleAllBtn').addEventListener('click', (ev) => {
    const expand = ev.target.textContent === 'Розгорнути все';
    setAllFoldersExpanded(expand);
    ev.target.textContent = expand ? 'Згорнути все' : 'Розгорнути все';
});

window.onload = loadResults;
</script>
<script src="/vendor/glightbox/glightbox.min.js"></script>
<script src="/vendor/sweetalert2/sweetalert2.min.js"></script>

</body>
</html>
