<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'/>
<title>Model Catalog</title>
<meta name='viewport' content='width=device-width,initial-scale=1'/>
<style>
body { margin:0; background:#111; color:#eee; font-family:system-ui, Segoe UI, Roboto, Arial; padding: 20px; }
h1 { margin-bottom: 16px; font-weight: 300; }
.page-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: #222; border-radius: 8px; overflow: hidden; }
th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #333; vertical-align: top; }
th { background: #1b1b1b; font-weight: 600; color: #aaa; text-transform: uppercase; font-size: 12px; }
tr:last-child td { border-bottom: none; }
tr:hover { background: #2a2a2a; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
.meta { color: #888; font-size: 12px; margin-top: 4px; }
.btn-compile {
  background: #2563eb; color: white; border: none; padding: 6px 12px;
  border-radius: 4px; cursor: pointer; font-size: 12px;
}
.btn-compile:hover { background: #1d4ed8; }
.btn-ghost {
  background: #333; color: #eee; border: 1px solid #444; padding: 6px 10px;
  border-radius: 6px; cursor: pointer; font-size: 12px;
}
.btn-ghost:hover { background: #3c3c3c; }
.btn-danger {
  background: #5b1f1f; color: #fee2e2; border: 1px solid #7f1d1d; padding: 6px 10px;
  border-radius: 6px; cursor: pointer; font-size: 12px;
}
.btn-danger:hover { background: #7f1d1d; }
.tag { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 11px; }
.tag-ok { background: #0f2f1f; color: #6ee7b7; border: 1px solid #14532d; }
.tag-warn { background: #2a1b00; color: #facc15; border: 1px solid #713f12; }
.tag-run { background: #0a1f3a; color: #93c5fd; border: 1px solid #1d4ed8; }
.empty { padding: 20px; text-align: center; color: #777; font-style: italic; }
.back-link { display: inline-block; margin-bottom: 16px; color: #888; text-decoration: none; font-size: 14px; }
.back-link:hover { color: #eee; }
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.is-visible { display: flex; }
.overlay-card {
  background: #151515;
  border: 1px solid #333;
  border-radius: 10px;
  width: min(900px, 96vw);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
}
.overlay-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid #333;
}
.overlay-body {
  padding: 12px 16px;
  overflow: auto;
}
.overlay-title { font-size: 14px; font-weight: 600; }
.overlay-status { font-size: 12px; color: #aaa; }
.overlay-close {
  background: #333; color: #eee; border: 1px solid #444;
  padding: 6px 10px; border-radius: 6px; cursor: pointer;
}
.log-box {
  background: #0c0c0c;
  border: 1px solid #222;
  border-radius: 6px;
  padding: 10px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: 12px;
  white-space: pre-wrap;
}
</style>
</head>
<body>

<a href="/" class="back-link">Back to Dashboard</a>

<div class="page-head">
  <h1 style="margin:0;">Model Catalog</h1>
  <button id="openCompileLogs" type="button" class="btn-ghost" style="display:none;">Open Compile Logs</button>
</div>

<div id="loading">Loading...</div>
<div class="table-wrap">
  <table id="modelsTable" style="display:none;">
      <thead>
          <tr>
              <th>Model</th>
              <th>Sources</th>
              <th>TensorRT Engine</th>
              <th>Task</th>
              <th>Action</th>
          </tr>
      </thead>
      <tbody id="modelsBody"></tbody>
  </table>
</div>

<div id="compileOverlay" class="overlay">
  <div class="overlay-card">
    <div class="overlay-header">
      <div>
        <div id="compileTitle" class="overlay-title">Compiling...</div>
        <div id="compileStatus" class="overlay-status">Waiting for updates...</div>
      </div>
      <button id="compileClose" type="button" class="overlay-close">Close</button>
    </div>
    <div class="overlay-body">
      <div id="compileCommand" class="meta"></div>
      <div id="compileLogs" class="log-box" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script>
let compilePollTimer = null;
let currentJobId = null;
let currentJobTitle = '';
let jobsByModel = {};
let latestJobId = null;

function filenameFromPath(path) {
    if (!path) return '';
    const parts = path.split('/');
    return parts[parts.length - 1];
}

function modelKey(type, name) {
    return `${type || ''}::${name || ''}`;
}

function taskOptionsHtml(selectedTask) {
    const selected = selectedTask || 'segment';
    return ['segment', 'detect', 'auto'].map(task => {
        const label = task === 'segment' ? 'segment (default)' : task;
        const isSelected = task === selected ? ' selected' : '';
        return `<option value="${task}"${isSelected}>${label}</option>`;
    }).join('');
}

function formatDuration(sec) {
    const s = Math.max(0, Math.floor(sec || 0));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const r = s % 60;
    if (h > 0) return `${h}h ${m}m ${r}s`;
    if (m > 0) return `${m}m ${r}s`;
    return `${r}s`;
}

function secondsSince(iso) {
    if (!iso) return 0;
    const ts = Date.parse(iso);
    if (Number.isNaN(ts)) return 0;
    return (Date.now() - ts) / 1000;
}

function setOpenLogsButtonVisible(visible) {
    const btn = document.getElementById('openCompileLogs');
    btn.style.display = visible ? 'inline-block' : 'none';
}

async function loadCompileJobs() {
    jobsByModel = {};
    latestJobId = null;
    try {
        const res = await fetch('/api/model-compile-jobs');
        const data = await res.json();
        if (!res.ok) return;
        const jobs = data.jobs || [];
        if (jobs.length > 0) {
            latestJobId = jobs[0].id;
        }
        jobs.forEach(job => {
            const model = job.model || {};
            const key = modelKey(model.type, model.name);
            if (!key || key === '::') return;
            if (!jobsByModel[key]) jobsByModel[key] = [];
            jobsByModel[key].push(job);
        });
    } catch (err) {
        // Keep page usable even if this endpoint fails.
    }
}

function getLatestJobForModel(type, name) {
    const list = jobsByModel[modelKey(type, name)] || [];
    return list.length > 0 ? list[0] : null;
}

async function loadModels() {
    const table = document.getElementById('modelsTable');
    const tbody = document.getElementById('modelsBody');
    const loading = document.getElementById('loading');
    document.querySelectorAll('.empty[data-model-empty="1"]').forEach(el => el.remove());

    try {
        const res = await fetch('/api/model-catalog');
        const data = await res.json();

        loading.style.display = 'none';
        tbody.innerHTML = '';

        if (!res.ok) {
            const msg = document.createElement('div');
            msg.className = 'empty';
            msg.setAttribute('data-model-empty', '1');
            msg.textContent = data.error || 'Failed to load model catalog.';
            document.body.appendChild(msg);
            return;
        }

        const models = data.models || [];
        if (models.length === 0) {
            table.style.display = 'none';
            const msg = document.createElement('div');
            msg.className = 'empty';
            msg.setAttribute('data-model-empty', '1');
            msg.textContent = 'No models found.';
            document.body.appendChild(msg);
            return;
        }

        table.style.display = 'table';

        models.forEach(model => {
            const tr = document.createElement('tr');
            const display = model.display || model.name || '-';
            const sourceFiles = (model.source_paths || []).map(filenameFromPath);
            const sourcesLabel = sourceFiles.length > 0 ? sourceFiles.join(', ') : '-';
            const latestJob = getLatestJobForModel(model.type, model.name);
            const isCompiling = latestJob && (latestJob.status === 'queued' || latestJob.status === 'running');
            const selectedTask = model.task || 'segment';

            let engineHtml = '<span class="tag tag-warn">Not compiled</span>';
            if (model.compiled && model.engine) {
                engineHtml = `<div class="mono">${model.engine.name}</div>` +
                             `<div class="meta">${model.engine.path || ''}</div>`;
            }

            const hasPtSource = (model.sources || []).includes('pt');
            const taskHtml = model.type === 'ul'
                ? `<select class="task-select" data-name="${model.name}" data-type="${model.type}" data-previous="${selectedTask}">
                    ${taskOptionsHtml(selectedTask)}
                   </select>
                   <div class="meta">Controls the Ultralytics task.</div>`
                : '<span class="meta">N/A</span>';
            const actionParts = [];
            if (isCompiling) {
                actionParts.push(`<button type="button" class="btn-ghost btn-open-job" data-job-id="${latestJob.id}" data-job-title="Compiling ${model.type.toUpperCase()} / ${model.name}">View Logs</button>`);
            } else if (model.compiled) {
                actionParts.push('<span class="tag tag-ok">Compiled</span>');
            } else if (hasPtSource) {
                actionParts.push(`<button type="button" class="btn-compile" data-name="${model.name}" data-type="${model.type}">Compile</button>`);
            } else {
                actionParts.push('<span class="tag tag-warn">No .pt</span>');
            }
            actionParts.push(`<button type="button" class="btn-danger btn-delete-model" data-name="${model.name}" data-type="${model.type}" ${isCompiling ? 'disabled' : ''}>Delete</button>`);
            const actionHtml = actionParts.join(' ');
            const statusMeta = isCompiling ? `<div class="meta"><span class="tag tag-run">${latestJob.status}</span></div>` : '';

            tr.innerHTML = `
                <td>
                    <div class="mono">${display}</div>
                    <div class="meta">Type: ${(model.type || '').toUpperCase()}</div>
                </td>
                <td>
                    <div class="mono">${sourcesLabel}</div>
                    <div class="meta">${(model.sources || []).join(', ')}</div>
                </td>
                <td>${engineHtml}${statusMeta}</td>
                <td>${taskHtml}</td>
                <td>${actionHtml}</td>
            `;

            tbody.appendChild(tr);
        });

        tbody.querySelectorAll('.btn-compile').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.getAttribute('data-name');
                const type = btn.getAttribute('data-type');
                startCompile(btn, { name, type });
            });
        });
        tbody.querySelectorAll('.btn-open-job').forEach(btn => {
            btn.addEventListener('click', () => {
                const jobId = btn.getAttribute('data-job-id');
                const title = btn.getAttribute('data-job-title') || 'Compile Logs';
                openCompileLogs(jobId, title);
            });
        });
        tbody.querySelectorAll('.task-select').forEach(select => {
            select.addEventListener('change', () => updateModelTask(select));
        });
        tbody.querySelectorAll('.btn-delete-model').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.getAttribute('data-name');
                const type = btn.getAttribute('data-type');
                deleteModel(btn, { name, type });
            });
        });
    } catch (err) {
        loading.style.display = 'none';
        const msg = document.createElement('div');
        msg.className = 'empty';
        msg.setAttribute('data-model-empty', '1');
        msg.textContent = 'Failed to load model catalog.';
        document.body.appendChild(msg);
    }
}

function showCompileOverlay(title) {
    document.getElementById('compileTitle').textContent = title;
    document.getElementById('compileOverlay').classList.add('is-visible');
}

function hideCompileOverlay() {
    document.getElementById('compileOverlay').classList.remove('is-visible');
}

document.getElementById('compileClose').addEventListener('click', hideCompileOverlay);
document.getElementById('openCompileLogs').addEventListener('click', () => {
    if (currentJobId) {
        showCompileOverlay(currentJobTitle || 'Compile Logs');
        return;
    }
    if (latestJobId) {
        openCompileLogs(latestJobId, 'Compile Logs');
    }
});

async function startCompile(buttonEl, model) {
    if (!model || !model.name || !model.type) return;
    buttonEl.disabled = true;
    const originalText = buttonEl.textContent;
    buttonEl.textContent = 'Compiling...';

    try {
        const res = await fetch('/api/model-compile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: model.name, type: model.type })
        });
        const data = await res.json();
        if (!res.ok) {
            buttonEl.disabled = false;
            buttonEl.textContent = originalText;
            alert(data.error || 'Failed to start compilation.');
            return;
        }

        const title = `Compiling ${model.type.toUpperCase()} / ${model.name}`;
        openCompileLogs(data.job_id, title);
        await loadCompileJobs();
        await loadModels();
    } catch (err) {
        buttonEl.disabled = false;
        buttonEl.textContent = originalText;
        alert('Failed to start compilation.');
    }
}

async function updateModelTask(selectEl) {
    const name = selectEl.getAttribute('data-name');
    const type = selectEl.getAttribute('data-type');
    const previous = selectEl.getAttribute('data-previous') || 'segment';
    const task = selectEl.value;

    if (!name || type !== 'ul') return;

    selectEl.disabled = true;
    try {
        const res = await fetch('/api/model-task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, type, task })
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(data.error || 'Failed to save task.');
        }
        const selectedTask = data.task || 'segment';
        selectEl.value = selectedTask;
        selectEl.setAttribute('data-previous', selectedTask);
    } catch (err) {
        selectEl.value = previous;
        alert(err.message || 'Failed to save task.');
    } finally {
        selectEl.disabled = false;
    }
}

async function deleteModel(buttonEl, model) {
    if (!model || !model.name || !model.type) return;

    const confirmed = confirm(`Delete all artifacts for ${model.type.toUpperCase()} / ${model.name}? This removes .pt, .onnx, and .engine files.`);
    if (!confirmed) return;

    buttonEl.disabled = true;
    const originalText = buttonEl.textContent;
    buttonEl.textContent = 'Deleting...';

    try {
        const res = await fetch('/api/model-delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: model.name, type: model.type })
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(data.error || 'Failed to delete model.');
        }
        await loadCompileJobs();
        await loadModels();
    } catch (err) {
        buttonEl.disabled = false;
        buttonEl.textContent = originalText;
        alert(err.message || 'Failed to delete model.');
    }
}

function clearCompilePolling() {
    if (compilePollTimer) {
        clearInterval(compilePollTimer);
        compilePollTimer = null;
    }
}

function openCompileLogs(jobId, title) {
    if (!jobId) return;
    currentJobId = jobId;
    currentJobTitle = title || 'Compile Logs';
    setOpenLogsButtonVisible(true);
    showCompileOverlay(currentJobTitle);
    document.getElementById('compileStatus').textContent = 'Loading...';
    document.getElementById('compileLogs').textContent = '';
    document.getElementById('compileCommand').textContent = '';
    startPollingJob(jobId);
}

function startPollingJob(jobId) {
    clearCompilePolling();
    async function fetchStatus() {
        try {
            const res = await fetch(`/api/model-compile/${jobId}`);
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('compileStatus').textContent = data.error || 'Status error.';
                return;
            }

            const status = data.status || 'unknown';
            const elapsed = formatDuration(secondsSince(data.started_at || data.created_at));
            document.getElementById('compileStatus').textContent = `Status: ${status} (${elapsed})`;
            if (data.command) {
                document.getElementById('compileCommand').textContent = `Command: ${data.command.join(' ')}`;
            }
            if (data.logs) {
                document.getElementById('compileLogs').textContent = data.logs.join('\\n');
            }

            if (status === 'done' || status === 'error') {
                clearCompilePolling();
                await loadCompileJobs();
                await loadModels();
            }
        } catch (err) {
            document.getElementById('compileStatus').textContent = 'Failed to fetch status.';
        }
    }

    fetchStatus();
    compilePollTimer = setInterval(fetchStatus, 2000);
}

async function initPage() {
    await loadCompileJobs();
    await loadModels();
    if (latestJobId) {
        setOpenLogsButtonVisible(true);
    }
}

initPage();
</script>

</body>
</html>
