<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'/>
<title>Model Catalog</title>
<meta name='viewport' content='width=device-width,initial-scale=1'/>
<style>
body { margin:0; background:#111; color:#eee; font-family:system-ui, Segoe UI, Roboto, Arial; padding: 20px; }
h1 { margin-bottom: 16px; font-weight: 300; }
.page-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.page-tools { display:flex; align-items:center; justify-content:flex-end; gap:10px; flex-wrap:wrap; }
.upload-tools { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: #222; border-radius: 8px; overflow: hidden; }
th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #333; vertical-align: top; }
th { background: #1b1b1b; font-weight: 600; color: #aaa; text-transform: uppercase; font-size: 12px; }
tr:last-child td { border-bottom: none; }
tr:hover { background: #2a2a2a; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
.meta { color: #888; font-size: 12px; margin-top: 4px; }
.btn-compile {
  background: #2563eb; color: white; border: none; padding: 6px 12px;
  border-radius: 4px; cursor: pointer; font-size: 12px;
}
.btn-compile:hover { background: #1d4ed8; }
.btn-ghost {
  background: #333; color: #eee; border: 1px solid #444; padding: 6px 10px;
  border-radius: 6px; cursor: pointer; font-size: 12px;
}
.btn-ghost:hover { background: #3c3c3c; }
.btn-danger {
  background: #5b1f1f; color: #fee2e2; border: 1px solid #7f1d1d; padding: 6px 10px;
  border-radius: 6px; cursor: pointer; font-size: 12px;
}
.btn-danger:hover { background: #7f1d1d; }
.tag { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 11px; }
.tag-ok { background: #0f2f1f; color: #6ee7b7; border: 1px solid #14532d; }
.tag-warn { background: #2a1b00; color: #facc15; border: 1px solid #713f12; }
.tag-run { background: #0a1f3a; color: #93c5fd; border: 1px solid #1d4ed8; }
.empty { padding: 20px; text-align: center; color: #777; font-style: italic; }
.back-link { display: inline-block; margin-bottom: 16px; color: #888; text-decoration: none; font-size: 14px; }
.back-link:hover { color: #eee; }
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.is-visible { display: flex; }
.overlay-card {
  background: #151515;
  border: 1px solid #333;
  border-radius: 10px;
  width: min(900px, 96vw);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
}
.overlay-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid #333;
}
.overlay-body {
  padding: 12px 16px;
  overflow: auto;
}
.overlay-title { font-size: 14px; font-weight: 600; }
.overlay-status { font-size: 12px; color: #aaa; }
.overlay-status.is-error { color: #fca5a5; }
.overlay-close:disabled { opacity: 0.5; cursor: default; }
.overlay-close {
  background: #333; color: #eee; border: 1px solid #444;
  padding: 6px 10px; border-radius: 6px; cursor: pointer;
}
.log-box {
  background: #0c0c0c;
  border: 1px solid #222;
  border-radius: 6px;
  padding: 10px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: 12px;
  white-space: pre-wrap;
}
.settings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(90px, 1fr));
  gap: 8px 10px;
}
.setting-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 12px;
  color: #bbb;
}
.setting-field input {
  width: 100%;
  box-sizing: border-box;
}
</style>
</head>
<body>

<a href="/" class="back-link">Back to Dashboard</a>

<div class="page-head">
  <h1 style="margin:0;">Model Catalog</h1>
  <div class="page-tools">
    <div id="tensorrtInfo" class="meta" style="margin:0;">Current TensorRT: loading...</div>
    <div class="upload-tools">
      <select id="uploadModelType" title="Target model family">
        <option value="ul">UL</option>
        <option value="rf">RF</option>
      </select>
      <button id="uploadModelBtn" type="button" class="btn-ghost">Завантажити ваги (.pt)</button>
      <input id="uploadModelInput" type="file" accept=".pt,.zip" style="display:none;" />
      <span id="uploadModelStatus" class="meta"></span>
    </div>
    <button id="openCompileLogs" type="button" class="btn-ghost" style="display:none;">Логи компіляції</button>
  </div>
</div>

<div id="loading">Loading...</div>
<div class="table-wrap">
  <table id="modelsTable" style="display:none;">
      <thead>
          <tr>
              <th>Model</th>
              <th>Owner</th>
              <th>Sources</th>
              <th>TensorRT Engine</th>
              <th>Task</th>
              <th>Default Conf</th>
              <th>Settings</th>
              <th>Action</th>
          </tr>
      </thead>
      <tbody id="modelsBody"></tbody>
  </table>
</div>

<div id="uploadOverlay" class="overlay">
  <div class="overlay-card" style="width:min(560px, 96vw);">
    <div class="overlay-header">
      <div>
        <div id="uploadTitle" class="overlay-title">Uploading model...</div>
        <div id="uploadStatus" class="overlay-status">Preparing upload...</div>
      </div>
      <button id="uploadClose" type="button" class="overlay-close" disabled>Закрити</button>
    </div>
  </div>
</div>

<div id="compileOverlay" class="overlay">
  <div class="overlay-card">
    <div class="overlay-header">
      <div>
        <div id="compileTitle" class="overlay-title">Compiling...</div>
        <div id="compileStatus" class="overlay-status">Waiting for updates...</div>
      </div>
      <button id="compileClose" type="button" class="overlay-close">Закрити</button>
    </div>
    <div class="overlay-body">
      <div id="compileCommand" class="meta"></div>
      <div id="compileLogs" class="log-box" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script src="/auth-client.js"></script>
<script>
let compilePollTimer = null;
let currentJobId = null;
let currentJobTitle = '';
let jobsByModel = {};
let latestJobId = null;

const uploadModelTypeEl = document.getElementById('uploadModelType');
const uploadModelBtn = document.getElementById('uploadModelBtn');
const uploadModelInput = document.getElementById('uploadModelInput');
const uploadModelStatusEl = document.getElementById('uploadModelStatus');
const tensorrtInfoEl = document.getElementById("tensorrtInfo");
const uploadOverlayEl = document.getElementById("uploadOverlay");
const uploadTitleEl = document.getElementById("uploadTitle");
const uploadStatusModalEl = document.getElementById("uploadStatus");
const uploadCloseEl = document.getElementById("uploadClose");

function showUploadOverlay(filename) {
    uploadTitleEl.textContent = "Importing " + filename;
    uploadStatusModalEl.textContent = "Preparing upload...";
    uploadStatusModalEl.classList.remove("is-error");
    uploadCloseEl.disabled = true;
    uploadOverlayEl.classList.add("is-visible");
}

function setUploadModalStatus(message, isError) {
    uploadStatusModalEl.textContent = message;
    uploadStatusModalEl.classList.toggle("is-error", Boolean(isError));
    uploadCloseEl.disabled = !isError;
}

function hideUploadOverlay() {
    uploadOverlayEl.classList.remove("is-visible");
}

uploadCloseEl.addEventListener("click", hideUploadOverlay);

function sendModelUpload(formData, filename, isPackage) {
    return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open("POST", "/api/model-upload");
        request.responseType = "json";

        request.upload.addEventListener("progress", event => {
            if (!event.lengthComputable) {
                setUploadModalStatus("Uploading " + filename + "...", false);
                return;
            }
            const percent = Math.round((event.loaded / event.total) * 100);
            setUploadModalStatus("Uploading " + filename + " (" + percent + "%)...", false);
        });
        request.upload.addEventListener("load", () => {
            setUploadModalStatus(
                isPackage
                    ? "Upload complete. Checking archive and TensorRT compatibility..."
                    : "Upload complete. Processing model metadata...",
                false
            );
        });
        request.addEventListener("load", () => {
            const data = request.response || {};
            if (request.status < 200 || request.status >= 300) {
                reject(new Error(data.error || "Failed to upload model."));
                return;
            }
            resolve(data);
        });
        request.addEventListener("error", () => {
            reject(new Error("Failed to upload model."));
        });
        request.send(formData);
    });
}

function updateUploadUiForType() {
    const type = uploadModelTypeEl.value;
    if (type === 'rf') {
        uploadModelBtn.textContent = 'Завантажити ваги (.pt/.zip)';
        uploadModelInput.setAttribute('accept', '.pt,.zip');
    } else {
        uploadModelBtn.textContent = 'Завантажити ваги (.pt)';
        uploadModelInput.setAttribute('accept', '.pt');
    }
}

function filenameFromPath(path) {
    if (!path) return '';
    const parts = path.split('/');
    return parts[parts.length - 1];
}

function modelKey(type, name) {
    return `${type || ''}::${name || ''}`;
}

function taskOptionsHtml(selectedTask) {
    const selected = selectedTask || 'segment';
    return ['segment', 'detect', 'auto'].map(task => {
        const label = task === 'segment' ? 'segment (default)' : task;
        const isSelected = task === selected ? ' selected' : '';
        return `<option value="${task}"${isSelected}>${label}</option>`;
    }).join('');
}

function formatDuration(sec) {
    const s = Math.max(0, Math.floor(sec || 0));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const r = s % 60;
    if (h > 0) return `${h}h ${m}m ${r}s`;
    if (m > 0) return `${m}m ${r}s`;
    return `${r}s`;
}

function secondsSince(iso) {
    if (!iso) return 0;
    const ts = Date.parse(iso);
    if (Number.isNaN(ts)) return 0;
    return (Date.now() - ts) / 1000;
}

function setOpenLogsButtonVisible(visible) {
    const btn = document.getElementById('openCompileLogs');
    btn.style.display = visible ? 'inline-block' : 'none';
}

async function loadCompileJobs() {
    jobsByModel = {};
    latestJobId = null;
    try {
        const res = await fetch('/api/model-compile-jobs');
        const data = await res.json();
        if (!res.ok) return;
        const jobs = data.jobs || [];
        if (jobs.length > 0) {
            latestJobId = jobs[0].id;
        }
        jobs.forEach(job => {
            const model = job.model || {};
            const key = modelKey(model.type, model.name);
            if (!key || key === '::') return;
            if (!jobsByModel[key]) jobsByModel[key] = [];
            jobsByModel[key].push(job);
        });
    } catch (err) {
        // Keep page usable even if this endpoint fails.
    }
}

function getLatestJobForModel(type, name) {
    const list = jobsByModel[modelKey(type, name)] || [];
    return list.length > 0 ? list[0] : null;
}

async function loadModels() {
    const table = document.getElementById('modelsTable');
    const tbody = document.getElementById('modelsBody');
    const loading = document.getElementById('loading');
    document.querySelectorAll('.empty[data-model-empty="1"]').forEach(el => el.remove());

    try {
        const res = await fetch('/api/model-catalog');
        const data = await res.json();
        const currentTensorRT = (data.tensorrt && data.tensorrt.current) ? data.tensorrt.current : 'unknown';
        tensorrtInfoEl.textContent = `Current TensorRT: ${currentTensorRT}`;

        loading.style.display = 'none';
        tbody.innerHTML = '';

        if (!res.ok) {
            const msg = document.createElement('div');
            msg.className = 'empty';
            msg.setAttribute('data-model-empty', '1');
            msg.textContent = data.error || 'Failed to load model catalog.';
            document.body.appendChild(msg);
            return;
        }

        const models = data.models || [];
        if (models.length === 0) {
            table.style.display = 'none';
            const msg = document.createElement('div');
            msg.className = 'empty';
            msg.setAttribute('data-model-empty', '1');
            msg.textContent = 'No models found.';
            document.body.appendChild(msg);
            return;
        }

        table.style.display = 'table';

        models.forEach(model => {
            const tr = document.createElement('tr');
            tr.setAttribute('data-name', model.name || '');
            tr.setAttribute('data-type', model.type || '');
            const display = model.display || model.name || '-';
            const sourceFiles = (model.source_paths || []).map(filenameFromPath);
            const sourcesLabel = sourceFiles.length > 0 ? sourceFiles.join(', ') : '-';
            const latestJob = getLatestJobForModel(model.type, model.name);
            const isCompiling = latestJob && (latestJob.status === 'queued' || latestJob.status === 'running');
            const selectedTask = model.task || 'segment';
            const defaultConfidenceThreshold = Number.isFinite(model.default_confidence_threshold)
                ? model.default_confidence_threshold
                : 0.75;
            const inferenceWidth = Number.isFinite(model.inference_width) ? model.inference_width : '';
            const inferenceHeight = Number.isFinite(model.inference_height) ? model.inference_height : '';
            const tilletiaMaxWidth = Number.isFinite(model.tilletia_filter_max_width_px)
                ? model.tilletia_filter_max_width_px : 68;
            const tilletiaMaxHeight = Number.isFinite(model.tilletia_filter_max_height_px)
                ? model.tilletia_filter_max_height_px : 68;
            const tilletiaTrainingWidth = Number.isFinite(model.tilletia_filter_training_width)
                ? model.tilletia_filter_training_width : 2592;
            const tilletiaTrainingHeight = Number.isFinite(model.tilletia_filter_training_height)
                ? model.tilletia_filter_training_height : 1944;

            let engineHtml = '<span class="tag tag-warn">Not compiled</span>';
            if (model.engine) {
                engineHtml = `<div class="mono">${model.engine.name}</div>` +
                             `<div class="meta">${model.engine.path || ''}</div>`;
                if (model.engine.tensorrt_version) {
                    engineHtml += `<div class="meta">Compiled with TensorRT ${model.engine.tensorrt_version}</div>`;
                }
                if (model.custom_input_size) {
                    engineHtml += `<div class="meta"><span class="tag tag-run">Custom input size</span></div>`;
                }
                if (model.compiled) {
                    engineHtml += `<div class="meta"><span class="tag tag-ok">Ready</span></div>`;
                }
            }

            const sources = model.sources || [];
            const hasCompilableSource = sources.includes('pt') || (model.type === 'rf' && sources.includes('onnx'));
            const packageMetadata = model.package_metadata || {};
            const packagePreprocessing = packageMetadata.preprocessing || {};
            const packageSizeLabel = Number.isFinite(packageMetadata.inference_width) && Number.isFinite(packageMetadata.inference_height)
                ? `${packageMetadata.inference_width}x${packageMetadata.inference_height}`
                : '';
            const normalization = packagePreprocessing.normalization || null;
            let normalizationLabel = '';
            if (Array.isArray(normalization) && normalization.length >= 2) {
                normalizationLabel = `mean [${normalization[0].join(', ')}], std [${normalization[1].join(', ')}]`;
            } else if (normalization && normalization.mean && normalization.std) {
                normalizationLabel = `mean [${normalization.mean.join(', ')}], std [${normalization.std.join(', ')}]`;
            }
            const taskHtml = model.type === 'ul'
                ? `<select class="task-select" data-name="${model.name}" data-type="${model.type}" data-previous="${selectedTask}">
                    ${taskOptionsHtml(selectedTask)}
                   </select>
                   <div class="meta">Controls the Ultralytics task.</div>`
                : '<span class="meta">N/A</span>';
            const defaultConfidenceHtml = `
                <input
                    class="default-confidence-input"
                    type="number"
                    min="0.00"
                    max="1.00"
                    step="0.05"
                    value="${defaultConfidenceThreshold.toFixed(2)}"
                    data-name="${model.name}"
                    data-type="${model.type}"
                    data-previous="${defaultConfidenceThreshold.toFixed(2)}"
                    style="width: 90px;"
                />
                <div class="meta">Used by the dashboard for this model.</div>
            `;
            let settingsHtml = model.type === 'ul'
                ? `
                    <div class="settings-grid">
                        <label class="setting-field">
                            <span>Width</span>
                            <input
                                class="inference-width-input"
                                type="number"
                                min="32"
                                step="1"
                                value="${inferenceWidth}"
                                data-previous="${inferenceWidth}"
                            />
                        </label>
                        <label class="setting-field">
                            <span>Height</span>
                            <input
                                class="inference-height-input"
                                type="number"
                                min="32"
                                step="1"
                                value="${inferenceHeight}"
                                data-previous="${inferenceHeight}"
                            />
                        </label>
                    </div>
                  `
                : (
                    packageSizeLabel
                        ? `<div class="mono">${packageSizeLabel}</div>
                           <div class="meta">${packagePreprocessing.color_mode || '-'} / ${packagePreprocessing.resize_mode || '-'}</div>
                           ${Number.isFinite(packagePreprocessing.scaling_factor) ? `<div class="meta">scale ${packagePreprocessing.scaling_factor}</div>` : ''}
                           ${normalizationLabel ? `<div class="meta">${normalizationLabel}</div>` : ''}`
                        : '<span class="meta">N/A</span>'
                );
            settingsHtml += `
                <div class="meta" style="margin-top:10px;">Tilletia max object (training px)</div>
                <div class="settings-grid">
                    <label class="setting-field">
                        <span>Max width</span>
                        <input
                            class="tilletia-filter-input tilletia-max-width-input"
                            type="number" min="1" step="1"
                            value="${tilletiaMaxWidth}"
                            data-previous="${tilletiaMaxWidth}"
                        />
                    </label>
                    <label class="setting-field">
                        <span>Max height</span>
                        <input
                            class="tilletia-filter-input tilletia-max-height-input"
                            type="number" min="1" step="1"
                            value="${tilletiaMaxHeight}"
                            data-previous="${tilletiaMaxHeight}"
                        />
                    </label>
                </div>
                <div class="meta" style="margin-top:8px;">Training resolution</div>
                <div class="settings-grid">
                    <label class="setting-field">
                        <span>Width</span>
                        <input
                            class="tilletia-filter-input tilletia-training-width-input"
                            type="number" min="1" step="1"
                            value="${tilletiaTrainingWidth}"
                            data-previous="${tilletiaTrainingWidth}"
                        />
                    </label>
                    <label class="setting-field">
                        <span>Height</span>
                        <input
                            class="tilletia-filter-input tilletia-training-height-input"
                            type="number" min="1" step="1"
                            value="${tilletiaTrainingHeight}"
                            data-previous="${tilletiaTrainingHeight}"
                        />
                    </label>
                </div>
            `;
            const actionParts = [];
            if (isCompiling) {
                actionParts.push(`<button type="button" class="btn-ghost btn-open-job" data-job-id="${latestJob.id}" data-job-title="Compiling ${model.type.toUpperCase()} / ${model.name}">Переглянути логи</button>`);
            } else if (hasCompilableSource) {
                const compileLabel = model.compiled ? 'Перекомпілювати' : 'Компілювати';
                actionParts.push(`<button type="button" class="btn-compile" data-name="${model.name}" data-type="${model.type}">${compileLabel}</button>`);
            } else {
                actionParts.push('<span class="tag tag-warn">No source</span>');
            }
            if (model.compiled) {
                actionParts.push('<span class="tag tag-ok">Compiled</span>');
            }
            actionParts.push(`<button type="button" class="btn-danger btn-delete-model" data-name="${model.name}" data-type="${model.type}" ${isCompiling ? 'disabled' : ''}>Видалити</button>`);
            const actionHtml = actionParts.join(' ');
            const statusMeta = isCompiling ? `<div class="meta"><span class="tag tag-run">${latestJob.status}</span></div>` : '';

            tr.innerHTML = `
                <td>
                    <div class="mono">${display}</div>
                    <div class="meta">Type: ${(model.type || '').toUpperCase()}</div>
                </td>
                <td>${model.owner_username || 'system'}</td>
                <td>
                    <div class="mono">${sourcesLabel}</div>
                    <div class="meta">${(model.sources || []).join(', ')}</div>
                </td>
                <td>${engineHtml}${statusMeta}</td>
                <td>${taskHtml}</td>
                <td>${defaultConfidenceHtml}</td>
                <td>${settingsHtml}</td>
                <td>${actionHtml}</td>
            `;

            tbody.appendChild(tr);
        });

        tbody.querySelectorAll('.btn-compile').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.getAttribute('data-name');
                const type = btn.getAttribute('data-type');
                startCompile(btn, { name, type });
            });
        });
        tbody.querySelectorAll('.btn-open-job').forEach(btn => {
            btn.addEventListener('click', () => {
                const jobId = btn.getAttribute('data-job-id');
                const title = btn.getAttribute('data-job-title') || 'Compile Logs';
                openCompileLogs(jobId, title);
            });
        });
        tbody.querySelectorAll('.task-select').forEach(select => {
            select.addEventListener('change', () => updateModelTask(select));
        });
        tbody.querySelectorAll('.default-confidence-input').forEach(input => {
            input.addEventListener('change', () => updateModelSettings(input));
        });
        tbody.querySelectorAll('.tilletia-filter-input').forEach(input => {
            input.addEventListener('change', () => updateModelSettings(input));
        });
        tbody.querySelectorAll('.btn-delete-model').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.getAttribute('data-name');
                const type = btn.getAttribute('data-type');
                deleteModel(btn, { name, type });
            });
        });
    } catch (err) {
        loading.style.display = 'none';
        tensorrtInfoEl.textContent = 'Current TensorRT: unavailable';
        const msg = document.createElement('div');
        msg.className = 'empty';
        msg.setAttribute('data-model-empty', '1');
        msg.textContent = 'Failed to load model catalog.';
        document.body.appendChild(msg);
    }
}

function showCompileOverlay(title) {
    document.getElementById('compileTitle').textContent = title;
    document.getElementById('compileOverlay').classList.add('is-visible');
}

function hideCompileOverlay() {
    document.getElementById('compileOverlay').classList.remove('is-visible');
}

document.getElementById('compileClose').addEventListener('click', hideCompileOverlay);
document.getElementById('openCompileLogs').addEventListener('click', () => {
    if (currentJobId) {
        showCompileOverlay(currentJobTitle || 'Compile Logs');
        return;
    }
    if (latestJobId) {
        openCompileLogs(latestJobId, 'Compile Logs');
    }
});

uploadModelBtn.addEventListener('click', () => {
    uploadModelInput.click();
});

uploadModelTypeEl.addEventListener('change', updateUploadUiForType);
updateUploadUiForType();

uploadModelInput.addEventListener('change', async () => {
    const file = uploadModelInput.files && uploadModelInput.files[0];
    if (!file) return;

    const selectedType = uploadModelTypeEl.value;
    const lowerName = file.name.toLowerCase();
    const isValidUpload = lowerName.endsWith('.pt') || (selectedType === 'rf' && lowerName.endsWith('.zip'));
    if (!isValidUpload) {
        uploadModelInput.value = '';
        alert(selectedType === 'rf' ? 'RF uploads support .pt weights or .zip packages.' : 'Only .pt model weights are supported.');
        return;
    }

    uploadModelBtn.disabled = true;
    uploadModelStatusEl.textContent = `Uploading ${file.name}...`;
    showUploadOverlay(file.name);

    try {
        const formData = new FormData();
        formData.append('type', uploadModelTypeEl.value);
        formData.append('file', file);

        const data = await sendModelUpload(
            formData,
            file.name,
            lowerName.endsWith(".zip")
        );

        uploadModelStatusEl.textContent = `Uploaded ${file.name}`;
        if (Number.isFinite(data.uploaded && data.uploaded.inference_width) && Number.isFinite(data.uploaded && data.uploaded.inference_height)) {
            uploadModelStatusEl.textContent = `Uploaded ${file.name} (${data.uploaded.inference_width}x${data.uploaded.inference_height})`;
        } else if (
            data.uploaded &&
            data.uploaded.package_metadata &&
            Number.isFinite(data.uploaded.package_metadata.inference_width) &&
            Number.isFinite(data.uploaded.package_metadata.inference_height)
        ) {
            uploadModelStatusEl.textContent = `Uploaded ${file.name} (${data.uploaded.package_metadata.inference_width}x${data.uploaded.package_metadata.inference_height})`;
        }
        if (data.tensorrt && data.tensorrt.current) {
            tensorrtInfoEl.textContent = `Current TensorRT: ${data.tensorrt.current}`;
        }
        setUploadModalStatus("Import complete. Refreshing model catalog...", false);
        await loadCompileJobs();
        await loadModels();
        hideUploadOverlay();
    } catch (err) {
        uploadModelStatusEl.textContent = "";
        setUploadModalStatus(err.message || "Failed to upload model.", true);
    } finally {
        uploadModelBtn.disabled = false;
        uploadModelInput.value = '';
    }
});

async function startCompile(buttonEl, model) {
    if (!model || !model.name || !model.type) return;
    buttonEl.disabled = true;
    const originalText = buttonEl.textContent;
    buttonEl.textContent = 'Компіляція...';

    try {
        const row = buttonEl.closest('tr');
        if (row) {
            await saveModelSettings(row, { reload: false });
        }

        const payload = { name: model.name, type: model.type };
        if (row && model.type === 'ul') {
            const widthInput = row.querySelector('.inference-width-input');
            const heightInput = row.querySelector('.inference-height-input');
            const inferenceWidth = parseInt(widthInput && widthInput.value, 10);
            const inferenceHeight = parseInt(heightInput && heightInput.value, 10);
            if (!Number.isFinite(inferenceWidth) || !Number.isFinite(inferenceHeight)) {
                throw new Error('Invalid model inference size.');
            }
            payload.inference_width = inferenceWidth;
            payload.inference_height = inferenceHeight;
        }

        const res = await fetch('/api/model-compile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
            buttonEl.disabled = false;
            buttonEl.textContent = originalText;
            alert(data.error || 'Failed to start compilation.');
            return;
        }

        const title = `Compiling ${model.type.toUpperCase()} / ${model.name}`;
        openCompileLogs(data.job_id, title);
        await loadCompileJobs();
        await loadModels();
    } catch (err) {
        buttonEl.disabled = false;
        buttonEl.textContent = originalText;
        alert(err.message || 'Failed to start compilation.');
    }
}

async function updateModelTask(selectEl) {
    const name = selectEl.getAttribute('data-name');
    const type = selectEl.getAttribute('data-type');
    const previous = selectEl.getAttribute('data-previous') || 'segment';
    const task = selectEl.value;

    if (!name || type !== 'ul') return;

    selectEl.disabled = true;
    try {
        const res = await fetch('/api/model-task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, type, task })
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(data.error || 'Failed to save task.');
        }
        const selectedTask = data.task || 'segment';
        selectEl.value = selectedTask;
        selectEl.setAttribute('data-previous', selectedTask);
    } catch (err) {
        selectEl.value = previous;
        alert(err.message || 'Failed to save task.');
    } finally {
        selectEl.disabled = false;
    }
}

function restorePreviousModelSettings(row) {
    row.querySelectorAll('.default-confidence-input, .tilletia-filter-input').forEach(input => {
        const previous = input.getAttribute('data-previous');
        if (previous !== null) {
            input.value = previous;
        }
    });
}

function setModelSettingsDisabled(row, disabled) {
    row.querySelectorAll('.default-confidence-input, .tilletia-filter-input').forEach(input => {
        input.disabled = disabled;
    });
}

function applySavedModelSettingsToRow(row, data) {
    if (!row || !data) return;

    const defaultConfidenceInput = row.querySelector('.default-confidence-input');
    if (defaultConfidenceInput && Number.isFinite(data.default_confidence_threshold)) {
        const value = Number(data.default_confidence_threshold).toFixed(2);
        defaultConfidenceInput.value = value;
        defaultConfidenceInput.setAttribute('data-previous', value);
    }

    const filterFields = [
        ['.tilletia-max-width-input', 'tilletia_filter_max_width_px'],
        ['.tilletia-max-height-input', 'tilletia_filter_max_height_px'],
        ['.tilletia-training-width-input', 'tilletia_filter_training_width'],
        ['.tilletia-training-height-input', 'tilletia_filter_training_height'],
    ];
    filterFields.forEach(([selector, key]) => {
        const input = row.querySelector(selector);
        if (input && Number.isFinite(data[key])) {
            const value = String(data[key]);
            input.value = value;
            input.setAttribute('data-previous', value);
        }
    });
}

function collectModelSettingsPayload(row) {
    if (!row) {
        throw new Error('Missing model row.');
    }

    const name = row.getAttribute('data-name');
    const type = row.getAttribute('data-type');
    const defaultConfidenceInput = row.querySelector('.default-confidence-input');
    const maxWidthInput = row.querySelector('.tilletia-max-width-input');
    const maxHeightInput = row.querySelector('.tilletia-max-height-input');
    const trainingWidthInput = row.querySelector('.tilletia-training-width-input');
    const trainingHeightInput = row.querySelector('.tilletia-training-height-input');
    if (
        !name || !type || !defaultConfidenceInput ||
        !maxWidthInput || !maxHeightInput ||
        !trainingWidthInput || !trainingHeightInput
    ) {
        throw new Error('Missing model settings.');
    }

    const threshold = parseFloat(defaultConfidenceInput.value);
    if (!Number.isFinite(threshold)) {
        throw new Error('Invalid default confidence threshold.');
    }

    const maxWidth = Number(maxWidthInput.value);
    const maxHeight = Number(maxHeightInput.value);
    const trainingWidth = Number(trainingWidthInput.value);
    const trainingHeight = Number(trainingHeightInput.value);
    const filterValues = [maxWidth, maxHeight, trainingWidth, trainingHeight];
    if (!filterValues.every(value => Number.isInteger(value) && value > 0)) {
        throw new Error('Invalid Tilletia filter settings.');
    }

    const payload = {
        name,
        type,
        default_confidence_threshold: threshold,
        tilletia_filter_max_width_px: maxWidth,
        tilletia_filter_max_height_px: maxHeight,
        tilletia_filter_training_width: trainingWidth,
        tilletia_filter_training_height: trainingHeight,
    };

    return payload;
}

async function saveModelSettings(row, { reload = true } = {}) {
    const payload = collectModelSettingsPayload(row);
    setModelSettingsDisabled(row, true);
    try {
        const res = await fetch('/api/model-metadata', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(data.error || 'Failed to save model settings.');
        }
        applySavedModelSettingsToRow(row, data);
        if (reload) {
            await loadCompileJobs();
            await loadModels();
        }
        return data;
    } catch (err) {
        restorePreviousModelSettings(row);
        throw err;
    } finally {
        if (row.isConnected) {
            setModelSettingsDisabled(row, false);
        }
    }
}

async function updateModelSettings(controlEl) {
    const row = controlEl.closest('tr');
    if (!row) return;

    try {
        await saveModelSettings(row);
    } catch (err) {
        alert(err.message || 'Failed to save model settings.');
    }
}

async function deleteModel(buttonEl, model) {
    if (!model || !model.name || !model.type) return;

    const confirmed = confirm(`Delete all artifacts for ${model.type.toUpperCase()} / ${model.name}? This removes .pt, .onnx, and .engine files.`);
    if (!confirmed) return;

    buttonEl.disabled = true;
    const originalText = buttonEl.textContent;
    buttonEl.textContent = 'Видалення...';

    try {
        const res = await fetch('/api/model-delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: model.name, type: model.type })
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(data.error || 'Failed to delete model.');
        }
        await loadCompileJobs();
        await loadModels();
    } catch (err) {
        buttonEl.disabled = false;
        buttonEl.textContent = originalText;
        alert(err.message || 'Failed to delete model.');
    }
}

function clearCompilePolling() {
    if (compilePollTimer) {
        clearInterval(compilePollTimer);
        compilePollTimer = null;
    }
}

function openCompileLogs(jobId, title) {
    if (!jobId) return;
    currentJobId = jobId;
    currentJobTitle = title || 'Compile Logs';
    setOpenLogsButtonVisible(true);
    showCompileOverlay(currentJobTitle);
    document.getElementById('compileStatus').textContent = 'Loading...';
    document.getElementById('compileLogs').textContent = '';
    document.getElementById('compileCommand').textContent = '';
    startPollingJob(jobId);
}

function startPollingJob(jobId) {
    clearCompilePolling();
    async function fetchStatus() {
        try {
            const res = await fetch(`/api/model-compile/${jobId}`);
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('compileStatus').textContent = data.error || 'Status error.';
                return;
            }

            const status = data.status || 'unknown';
            const elapsed = formatDuration(secondsSince(data.started_at || data.created_at));
            document.getElementById('compileStatus').textContent = `Status: ${status} (${elapsed})`;
            if (data.command) {
                document.getElementById('compileCommand').textContent = `Command: ${data.command.join(' ')}`;
            }
            if (data.logs) {
                document.getElementById('compileLogs').textContent = data.logs.join('\\n');
            }

            if (status === 'done' || status === 'error') {
                clearCompilePolling();
                await loadCompileJobs();
                await loadModels();
            }
        } catch (err) {
            document.getElementById('compileStatus').textContent = 'Failed to fetch status.';
        }
    }

    fetchStatus();
    compilePollTimer = setInterval(fetchStatus, 2000);
}

async function initPage() {
    await loadCompileJobs();
    await loadModels();
    if (latestJobId) {
        setOpenLogsButtonVisible(true);
    }
}

initPage();
</script>
