<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'/>
<title>RF App (Desktop)</title>
<meta name='viewport' content='width=device-width,initial-scale=1'/>
<style>
body {
  margin: 0;
  background: #111;
  color: #eee;
  font-family: system-ui, Segoe UI, Roboto, Arial;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

header {
  padding: 10px 14px;
  background: #1b1b1b;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-bottom: 1px solid #333;
  flex-shrink: 0;
}

.control-row {
  display: flex;
  gap: 12px;
  align-items: center;
  width: 100%;
}

input:not([type="checkbox"]), select, button {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #333;
  background: #222;
  color: #eee;
  font-size: 13px;
}

input[type="checkbox"] { accent-color: #eab308; }
button { cursor: pointer; transition: transform .06s ease, opacity .2s; }
button:active { transform: scale(0.98); }
button[disabled] { opacity: .5; cursor: not-allowed; }

.status {
  font-size: 12px;
  opacity: .9;
  margin-left: auto;
  padding: 4px 8px;
  border-radius: 8px;
  background: #222;
  white-space: nowrap;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
  flex: 1;
  position: relative;
  min-height: 0;
}

.pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; height: 100%; }
.video-viewport { position: relative; flex: 1; min-height: 0; overflow: hidden; background: #000; }
.video-viewport.panning { cursor: grabbing; }
.pane video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
  transform-origin: 0 0;
  will-change: transform;
}
.zoom-controls {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 6px;
  z-index: 2;
}
.zoom-controls button { background: rgba(34, 34, 34, .88); border-color: #555; }
.controls { display: flex; gap: 10px; align-items: center; }
.hidden { display: none !important; }
.btn-primary { background: #2563eb; border: 1px solid #1d4ed8; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #333; border: 1px solid #555; }
.btn-secondary:hover { background: #444; }
input[type="number"], input[type="text"] { border: 1px solid #444; background-color: #1a1a1a; }
select { border: 1px solid #444; }
.user-note { font-size: 12px; color: #999; }
</style>
</head>
<body>

<header>
  <div class="control-row">
    <div class="controls">
      <label for="analysisNum" style="font-size:13px; font-weight:bold; color:#aaa;">Analysis #:</label>
      <input id="analysisNum" type="text" placeholder="Auto" value="{{ dashboard_settings.analysis_number }}" style="width: 120px;" title="Manual Analysis Number"{% if not can_configure_dashboard %} disabled hidden{% endif %}/>
    </div>

    <div class='status'><span id='status'>status: idle</span></div>
  </div>

  <div class="control-row">
    <select id="sourceType" style="font-weight:bold;"{% if not can_configure_dashboard %} disabled hidden{% endif %}>
      <option value="camera"{% if dashboard_settings.source_type == "camera" %} selected{% endif %}>Camera Source</option>
      <option value="file"{% if dashboard_settings.source_type == "file" %} selected{% endif %}>File Upload</option>
    </select>

    <div id="camControls" class="controls{% if dashboard_settings.source_type != 'camera' %} hidden{% endif %}">
      <select id="camDevice" style="max-width: 200px;"{% if not can_configure_dashboard %} disabled hidden{% endif %}><option>Loading...</option></select>
      <select id="camMode" style="max-width: 220px;"{% if not can_configure_dashboard %} disabled hidden{% endif %}><option>-</option></select>
      <button id="refreshCams" title="Refresh Cameras"{% if not can_configure_dashboard %} disabled hidden{% endif %}>↻</button>
    </div>

    <div id="fileControls" class="controls{% if dashboard_settings.source_type != 'file' %} hidden{% endif %}">
      <button id='uploadBtn' type='button' class="btn-secondary"{% if not can_configure_dashboard %} disabled hidden{% endif %}>Choose Video</button>
      <input id='upload' type='file' accept='video/*' style='display:none'{% if not can_configure_dashboard %} disabled hidden{% endif %}/>
      <span id="fileName" style="font-size:12px; color:#aaa; max-width: 200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
      <input type="hidden" id="uploadedPath" value="{{ dashboard_settings.uploaded_path }}" />
    </div>
  </div>

  <div class="control-row">
    <select id="modelSelect" title="Select AI Model" style="max-width: 250px;" data-selected-model="{{ dashboard_settings.model_path }}"{% if not can_configure_dashboard %} disabled hidden{% endif %}>
      <option value="">Loading Models...</option>
    </select>

    <div class="controls">
      <label for="confThreshold" style="font-size:12px; opacity:0.8;">Conf:</label>
      <input id="confThreshold" type="number" min="0.1" max="1.0" step="0.05" value="{{ '%.2f'|format(dashboard_settings.vis_conf) }}" style="width: 100px;" title="Detection Confidence Threshold"{% if not can_configure_dashboard %} disabled hidden{% endif %}/>
    </div>

    <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:#ddd;">
      <input id="gridCountEnabled" type="checkbox"{% if dashboard_settings.grid_count_enabled %} checked{% endif %}{% if not can_configure_dashboard %} disabled hidden{% endif %} />
      Grid Counting
    </label>

    <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:#ddd;">
      <input id="gridDebugEnabled" type="checkbox"{% if dashboard_settings.grid_debug_enabled %} checked{% endif %}{% if not can_configure_dashboard %} disabled hidden{% endif %} />
      Grid Debug
    </label>

    <div class="controls">
      <label for="gridScoreThreshold" style="font-size:12px; opacity:0.8;">Grid Min:</label>
      <input id="gridScoreThreshold" type="number" min="0.00" max="1.00" step="0.05" value="{{ '%.2f'|format(dashboard_settings.grid_score_threshold) }}" style="width: 90px;" title="Auto-disable grid counting when grid score is at or below this threshold"{% if not can_configure_dashboard %} disabled hidden{% endif %}/>
    </div>

    <div style="flex:1"></div>
    <button id='run' class="btn-primary" style="min-width: 80px;">Run</button>
    <button id='stop' type='button' style="min-width: 60px;">Stop</button>
    <button id='snapshotBtn' type='button' class="btn-secondary" style="min-width: 120px;" disabled>Take Snapshot</button>

    <a href="/results" target="_blank" style="text-decoration:none; margin-left: 10px;">
      <button type="button" class="btn-secondary">See Results</button>
    </a>
    <a href="/settings" target="_blank" style="text-decoration:none; margin-left: 6px;">
      <button type="button" class="btn-secondary">Settings</button>
    </a>
    {% if can_view_models %}
    <a href="/models" target="_blank" style="text-decoration:none; margin-left: 6px;">
      <button type="button" class="btn-secondary">Model Catalog</button>
    </a>
    {% endif %}
    {% if can_manage_users %}
    <a href="/users" target="_blank" style="text-decoration:none; margin-left: 6px;">
      <button type="button" class="btn-secondary">Users</button>
    </a>
    {% endif %}
    <button id="logoutBtn" type="button" class="btn-secondary" style="margin-left: 6px;">Logout</button>
  </div>

  {% if not can_configure_dashboard %}
  <div class="control-row">
    <div class="user-note">You can run, stop, and review your own results. Dashboard configuration is controlled by an administrator.</div>
  </div>
  {% endif %}
</header>

<div class='grid'>
  <div class='pane'>
    <div id="videoViewport" class="video-viewport">
      <div class="zoom-controls">
        <button id="zoomInBtn" type="button" title="Zoom in">Zoom In</button>
        <button id="zoomOutBtn" type="button" title="Zoom out">Zoom Out</button>
        <button id="zoomResetBtn" type="button" title="Reset zoom">Reset</button>
      </div>
      <video id='wf' playsinline autoplay muted controls></video>
    </div>
  </div>
</div>

<script src="/auth-client.js"></script>
<script>
const CAN_CONFIGURE_DASHBOARD = {{ 'true' if can_configure_dashboard else 'false' }};
const INITIAL_DASHBOARD_SETTINGS = {{ dashboard_settings_json | safe }};

let pc_wf = null;
let state = 'idle';
let isUploading = false;
let uploadProgress = 0;
let cameraList = [];
let modelThresholdByPath = {};

const statusEl = document.getElementById('status');
const btnRun = document.getElementById('run');
const btnStop = document.getElementById('stop');
const snapshotBtn = document.getElementById('snapshotBtn');
const vWf = document.getElementById('wf');

const sourceTypeEl = document.getElementById('sourceType');
const camControls = document.getElementById('camControls');
const fileControls = document.getElementById('fileControls');
const camDeviceEl = document.getElementById('camDevice');
const camModeEl = document.getElementById('camMode');
const refreshCamsBtn = document.getElementById('refreshCams');
const confThresholdEl = document.getElementById('confThreshold');
const analysisNumEl = document.getElementById('analysisNum');
const modelSelectEl = document.getElementById('modelSelect');
const gridCountEnabledEl = document.getElementById('gridCountEnabled');
const gridDebugEnabledEl = document.getElementById('gridDebugEnabled');
const gridScoreThresholdEl = document.getElementById('gridScoreThreshold');
const uploadBtn = document.getElementById('uploadBtn');
const uploadInput = document.getElementById('upload');
const fileNameEl = document.getElementById('fileName');
const logoutBtn = document.getElementById('logoutBtn');
const uploadedPathEl = document.getElementById('uploadedPath');
const videoViewport = document.getElementById('videoViewport');
const zoomInBtn = document.getElementById('zoomInBtn');
const zoomOutBtn = document.getElementById('zoomOutBtn');
const zoomResetBtn = document.getElementById('zoomResetBtn');

const zoomState = {
  scale: 1,
  x: 0,
  y: 0,
  dragging: false,
  lastX: 0,
  lastY: 0,
};
const MIN_ZOOM = 1;
const MAX_ZOOM = 8;
const ZOOM_STEP = 1.2;

function clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function clampPan() {
  const rect = videoViewport.getBoundingClientRect();
  const maxX = Math.max(0, (zoomState.scale - 1) * rect.width);
  const maxY = Math.max(0, (zoomState.scale - 1) * rect.height);
  zoomState.x = clamp(zoomState.x, -maxX, 0);
  zoomState.y = clamp(zoomState.y, -maxY, 0);
}

function applyVideoTransform() {
  clampPan();
  vWf.style.transform = `translate(${zoomState.x}px, ${zoomState.y}px) scale(${zoomState.scale})`;
}

function resetVideoZoom() {
  zoomState.scale = 1;
  zoomState.x = 0;
  zoomState.y = 0;
  applyVideoTransform();
}

function zoomVideo(multiplier, clientX, clientY) {
  const nextScale = clamp(zoomState.scale * multiplier, MIN_ZOOM, MAX_ZOOM);
  if (nextScale === zoomState.scale) return;

  const rect = videoViewport.getBoundingClientRect();
  const originX = (clientX ?? (rect.left + rect.width / 2)) - rect.left;
  const originY = (clientY ?? (rect.top + rect.height / 2)) - rect.top;
  const ratio = nextScale / zoomState.scale;

  zoomState.x = originX - (originX - zoomState.x) * ratio;
  zoomState.y = originY - (originY - zoomState.y) * ratio;
  zoomState.scale = nextScale;
  applyVideoTransform();
}

zoomInBtn.onclick = () => zoomVideo(ZOOM_STEP);
zoomOutBtn.onclick = () => zoomVideo(1 / ZOOM_STEP);
zoomResetBtn.onclick = resetVideoZoom;

videoViewport.addEventListener('wheel', (ev) => {
  ev.preventDefault();
  zoomVideo(ev.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP, ev.clientX, ev.clientY);
}, { passive: false });

videoViewport.addEventListener('contextmenu', (ev) => {
  ev.preventDefault();
});

videoViewport.addEventListener('pointerdown', (ev) => {
  if (ev.button !== 2 || zoomState.scale <= 1) return;
  ev.preventDefault();
  zoomState.dragging = true;
  zoomState.lastX = ev.clientX;
  zoomState.lastY = ev.clientY;
  videoViewport.classList.add('panning');
  videoViewport.setPointerCapture(ev.pointerId);
});

videoViewport.addEventListener('pointermove', (ev) => {
  if (!zoomState.dragging) return;
  ev.preventDefault();
  zoomState.x += ev.clientX - zoomState.lastX;
  zoomState.y += ev.clientY - zoomState.lastY;
  zoomState.lastX = ev.clientX;
  zoomState.lastY = ev.clientY;
  applyVideoTransform();
});

function stopVideoPan(ev) {
  if (!zoomState.dragging) return;
  zoomState.dragging = false;
  videoViewport.classList.remove('panning');
  try { videoViewport.releasePointerCapture(ev.pointerId); } catch (e) {}
}

videoViewport.addEventListener('pointerup', stopVideoPan);
videoViewport.addEventListener('pointercancel', stopVideoPan);
window.addEventListener('resize', applyVideoTransform);

function uploadedFileLabel(path) {
  if (!path) return '';
  const segments = String(path).split(/[\\/]/);
  return segments[segments.length - 1] || path;
}

function syncUploadedFileLabel(path) {
  fileNameEl.textContent = uploadedFileLabel(path);
}

function selectedCameraMode() {
  try {
    return JSON.parse(camModeEl.value || '{}');
  } catch (err) {
    return {};
  }
}

async function saveDashboardSettings(payload) {
  if (!CAN_CONFIGURE_DASHBOARD) return;
  await fetch('/api/dashboard-settings', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
}

function formatThresholdValue(value, fallback = 0.75) {
  const normalized = Number.isFinite(value) ? value : fallback;
  return normalized.toFixed(2);
}

async function applySelectedModelDefaults({ persist = false } = {}) {
  const selectedPath = modelSelectEl.value;
  const payload = { model_path: selectedPath };
  const selectedThreshold = modelThresholdByPath[selectedPath];

  if (Number.isFinite(selectedThreshold)) {
    confThresholdEl.value = formatThresholdValue(selectedThreshold);
    payload.vis_conf = selectedThreshold;
  }

  if (persist) {
    await saveDashboardSettings(payload);
  }
}

function syncSourceVisibility() {
  if (sourceTypeEl.value === 'camera') {
    camControls.classList.remove('hidden');
    fileControls.classList.add('hidden');
  } else {
    camControls.classList.add('hidden');
    fileControls.classList.remove('hidden');
  }
}

sourceTypeEl.onchange = async () => {
  syncSourceVisibility();
  await saveDashboardSettings({ source_type: sourceTypeEl.value });
};

analysisNumEl.onchange = () => saveDashboardSettings({ analysis_number: analysisNumEl.value });
confThresholdEl.onchange = () => saveDashboardSettings({ vis_conf: parseFloat(confThresholdEl.value || '0.75') });
modelSelectEl.onchange = () => applySelectedModelDefaults({ persist: true });

logoutBtn.onclick = async () => {
  try {
    await fetch('/auth/logout', { method: 'POST' });
  } catch (err) {
    console.error(err);
  }
  window.location.href = '/login';
};

async function loadCameras() {
  camDeviceEl.innerHTML = '<option>Loading...</option>';
  try {
    const res = await fetch('/api/cameras');
    const data = await res.json();
    cameraList = data.cameras || [];

    camDeviceEl.innerHTML = '';
    if (cameraList.length === 0) {
      camDeviceEl.innerHTML = '<option value="">No cameras found</option>';
      camModeEl.innerHTML = '';
      return;
    }

    cameraList.forEach((cam, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = `${cam.name} (${cam.device})`;
      if (cam.device === INITIAL_DASHBOARD_SETTINGS.camera_device) {
        opt.selected = true;
      }
      camDeviceEl.appendChild(opt);
    });

    updateModes();
  } catch (e) {
    console.error(e);
    camDeviceEl.innerHTML = '<option>Error</option>';
  }
}

function updateModes() {
  const idx = camDeviceEl.value;
  camModeEl.innerHTML = '';

  if (idx === '' || !cameraList[idx]) return;

  const modes = cameraList[idx].modes || [];
  const wantedMode = INITIAL_DASHBOARD_SETTINGS.camera_mode || {};

  modes.forEach(m => {
    const opt = document.createElement('option');
    opt.value = JSON.stringify(m);
    opt.textContent = `${m.width}x${m.height} @ ${m.fps}fps (${m.format})`;
    if (
      INITIAL_DASHBOARD_SETTINGS.camera_device &&
      m.width === wantedMode.width &&
      m.height === wantedMode.height &&
      m.fps === wantedMode.fps &&
      m.format === wantedMode.format
    ) {
      opt.selected = true;
    }
    camModeEl.appendChild(opt);
  });

  if (camModeEl.options.length === 0) {
    camModeEl.innerHTML = '<option>-</option>';
  }
}

camDeviceEl.onchange = async () => {
  updateModes();
  const cam = cameraList[camDeviceEl.value];
  if (!cam) return;
  await saveDashboardSettings({
    camera_device: cam.device,
    camera_mode: selectedCameraMode(),
  });
};

camModeEl.onchange = () => {
  const cam = cameraList[camDeviceEl.value];
  saveDashboardSettings({
    camera_device: cam ? cam.device : '',
    camera_mode: selectedCameraMode(),
  });
};
refreshCamsBtn.onclick = loadCameras;

async function updateGridSettings() {
  const parsedThreshold = parseFloat(gridScoreThresholdEl.value || '0');
  const scoreThreshold = Number.isFinite(parsedThreshold) ? parsedThreshold : 0;
  await fetch('/api/grid', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      enabled: gridCountEnabledEl.checked,
      debug_enabled: gridDebugEnabledEl.checked,
      score_threshold: scoreThreshold
    })
  });
}

gridCountEnabledEl.onchange = async () => {
  if (!CAN_CONFIGURE_DASHBOARD) return;
  try {
    await updateGridSettings();
  } catch (e) {
    console.error(e);
  }
};

gridDebugEnabledEl.onchange = async () => {
  if (!CAN_CONFIGURE_DASHBOARD) return;
  try {
    await updateGridSettings();
  } catch (e) {
    console.error(e);
  }
};

gridScoreThresholdEl.onchange = async () => {
  if (!CAN_CONFIGURE_DASHBOARD) return;
  try {
    await updateGridSettings();
  } catch (e) {
    console.error(e);
  }
};

async function loadModels() {
  modelSelectEl.innerHTML = '<option value="">Loading...</option>';
  modelThresholdByPath = {};
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    const models = data.models || [];

    modelSelectEl.innerHTML = '';
    if (models.length === 0) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'No models found (*.engine)';
      modelSelectEl.appendChild(opt);
      return;
    }

    models.forEach(m => {
      const threshold = Number.isFinite(m.default_confidence_threshold) ? m.default_confidence_threshold : 0.75;
      modelThresholdByPath[m.path] = threshold;
      const opt = document.createElement('option');
      opt.value = m.path;
      opt.textContent = m.display;
      if (m.path === INITIAL_DASHBOARD_SETTINGS.model_path) {
        opt.selected = true;
      }
      modelSelectEl.appendChild(opt);
    });

    if (!modelSelectEl.value && models.length > 0) {
      modelSelectEl.selectedIndex = 0;
    }

    await applySelectedModelDefaults();
  } catch (e) {
    console.error(e);
    modelSelectEl.innerHTML = '<option value="">Error loading models</option>';
  }
}

function applyState(j) {
  if (isUploading) {
    btnRun.disabled = true;
    btnStop.disabled = true;
    uploadBtn.disabled = true;
    statusEl.textContent = `status: uploading ${uploadProgress}%`;
    return;
  }

  state = (j && j.state) || 'idle';
  const isRunning = state === 'starting' || state === 'running';
  btnRun.disabled = isRunning;
  btnRun.textContent = state === 'running' ? 'Running' : (state === 'starting' ? 'Starting...' : 'Run');
  btnStop.disabled = state === 'idle' || state === 'stopping';
  snapshotBtn.disabled = state !== 'running';

  uploadBtn.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  sourceTypeEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  camDeviceEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  camModeEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  confThresholdEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  analysisNumEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  modelSelectEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  gridCountEnabledEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  gridDebugEnabledEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;
  gridScoreThresholdEl.disabled = isRunning || !CAN_CONFIGURE_DASHBOARD;

  let mtxStatus = '';
  if (j && j.mediamtx) {
    if (!j.mediamtx.whep) {
      mtxStatus = ' [MediaMTX OFFLINE]';
      statusEl.style.color = '#ff4444';
      statusEl.style.fontWeight = 'bold';
    } else {
      statusEl.style.color = '#eee';
      statusEl.style.fontWeight = 'normal';
    }
  }

  let msg = 'status: ' + state + ' pid:' + ((j && j.pipeline_id) || '-') + mtxStatus;
  if (j && j.last_error && state !== 'running') msg += ' fail: ' + j.last_error;

  if (j && j.runtime && typeof j.runtime.grid_count_enabled === 'boolean') {
    gridCountEnabledEl.checked = j.runtime.grid_count_enabled;
  }
  if (j && j.runtime && typeof j.runtime.grid_debug_enabled === 'boolean') {
    gridDebugEnabledEl.checked = j.runtime.grid_debug_enabled;
  }
  if (j && j.runtime && typeof j.runtime.grid_score_threshold === 'number') {
    gridScoreThresholdEl.value = j.runtime.grid_score_threshold.toFixed(2);
  }
  if (j && j.runtime && typeof j.runtime.grid_score === 'number') {
    msg += ` [Grid score: ${j.runtime.grid_score.toFixed(2)}`;
    if (typeof j.runtime.grid_score_threshold === 'number' && j.runtime.grid_score_threshold > 0) {
      msg += ` / ${j.runtime.grid_score_threshold.toFixed(2)}`;
    }
    if (j.runtime.grid_auto_disabled) {
      msg += ' auto-off';
    }
    msg += ']';
  }

  if (state === 'running' && j.config) {
    if (j.config.video_reference) msg += ` [${j.config.video_reference}]`;
    if (j.config.model) msg += ` [Model: ${j.config.model}]`;
    if (j.config.model_task) msg += ` [Task: ${j.config.model_task}]`;
  }
  statusEl.textContent = msg;

  if (state !== 'running') {
    disconnectWHEP_wf();
  }
}

async function refresh() {
  try {
    const r = await fetch('/api/status');
    const j = await r.json();
    applyState(j);
    return j;
  } catch (e) {
    statusEl.textContent = 'status: error';
    return null;
  }
}

async function connectWHEP_wf(path, retryCount = 0, maxRetries = 5) {
  const whep = '/' + encodeURIComponent(path) + '/whep';
  try {
    if (pc_wf) {
      try { pc_wf.close(); } catch (e) {}
      pc_wf = null;
    }
    vWf.srcObject = null;

    pc_wf = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }] });
    pc_wf.addEventListener('track', (ev) => { vWf.srcObject = ev.streams[0]; });

    const offer = await pc_wf.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: false });
    await pc_wf.setLocalDescription(offer);

    const rr = await fetch(whep, { method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: offer.sdp });
    if (!rr.ok) {
      if (rr.status === 404 && retryCount < maxRetries) {
        await new Promise(resolve => setTimeout(resolve, 1000 * (retryCount + 1)));
        return connectWHEP_wf(path, retryCount + 1, maxRetries);
      }
      throw new Error('WHEP HTTP ' + rr.status);
    }
    const answer = await rr.text();
    await pc_wf.setRemoteDescription({ type: 'answer', sdp: answer });
  } catch (e) {
    console.error(e);
  }
}

function disconnectWHEP_wf() {
  try { if (pc_wf) { pc_wf.close(); } } catch (e) {}
  pc_wf = null;
  vWf.srcObject = null;
}

btnRun.onclick = async () => {
  let payload = {};

  if (CAN_CONFIGURE_DASHBOARD) {
    const confVal = parseFloat(confThresholdEl.value);
    const analysisVal = analysisNumEl.value;
    const modelVal = modelSelectEl.value;
    const common = {
      vis_conf: confVal,
      analysis_number: analysisVal,
      model_path: modelVal,
      grid_count_enabled: gridCountEnabledEl.checked,
      grid_debug_enabled: gridDebugEnabledEl.checked,
      grid_score_threshold: parseFloat(gridScoreThresholdEl.value || '0')
    };

    if (sourceTypeEl.value === 'camera') {
      const camIdx = camDeviceEl.value;
      if (camIdx === '' || !cameraList[camIdx]) { alert('Select a camera'); return; }

      const modeStr = camModeEl.value;
      if (!modeStr) { alert('Select a mode'); return; }

      const mode = JSON.parse(modeStr);
      payload = {
        ...common,
        source_type: 'camera',
        device: cameraList[camIdx].device,
        width: mode.width,
        height: mode.height,
        fps: mode.fps,
        format: mode.format
      };
    } else {
      const path = uploadedPathEl.value;
      if (!path) { alert('Upload a file first'); return; }
      payload = {
        ...common,
        source_type: 'file',
        video: path
      };
    }
  }

  try {
    statusEl.textContent = 'status: requesting start...';
    const startRes = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!startRes.ok) {
      const err = await startRes.json().catch(() => ({}));
      throw new Error(err.error || startRes.status);
    }
    await refresh();
    await connectWHEP_wf('pub-output');
  } catch (e) {
    statusEl.textContent = 'status: failed -> ' + e;
    disconnectWHEP_wf();
  }
};

btnStop.onclick = async () => {
  try {
    statusEl.textContent = 'status: stopping...';
    disconnectWHEP_wf();
    await fetch('/api/stop', { method: 'POST' });
    await refresh();
  } catch (e) {
    console.error(e);
  }
};

snapshotBtn.onclick = async () => {
  snapshotBtn.disabled = true;
  try {
    const response = await fetch('/api/snapshot', { method: 'POST' });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(data.error || 'Snapshot failed');
    }
  } catch (e) {
    console.error(e);
  } finally {
    if (state === 'running') {
      snapshotBtn.disabled = false;
    }
  }
};

uploadBtn.onclick = () => { uploadInput.click(); };

uploadInput.onchange = function () {
  if (!uploadInput.files.length || isUploading) return;

  const file = uploadInput.files[0];
  const fd = new FormData();
  fd.append('file', file);
  fileNameEl.textContent = file.name;

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/upload');

  xhr.upload.onprogress = function (e) {
    if (e.lengthComputable) {
      uploadProgress = Math.round((e.loaded / e.total) * 100);
      applyState();
    }
  };

  xhr.onload = async function () {
    isUploading = false;
    if (xhr.status !== 200) {
      statusEl.textContent = 'upload error: ' + xhr.status;
      refresh();
      return;
    }
    try {
      const j = JSON.parse(xhr.responseText);
      uploadedPathEl.value = j.video;
      syncUploadedFileLabel(j.video);
      statusEl.textContent = 'status: upload complete';
      await saveDashboardSettings({ uploaded_path: j.video, source_type: 'file' });
      sourceTypeEl.value = 'file';
      syncSourceVisibility();
      refresh();
    } catch (e) {
      console.error(e);
    }
  };

  isUploading = true;
  uploadProgress = 0;
  applyState();
  xhr.send(fd);
};

window.addEventListener('load', async () => {
  syncUploadedFileLabel(uploadedPathEl.value);
  syncSourceVisibility();
  if (CAN_CONFIGURE_DASHBOARD) {
    await loadCameras();
    await loadModels();
  }
  await refresh();
  setInterval(refresh, 1500);

  if (state === 'running') {
    await connectWHEP_wf('pub-output');
  }
});

window.addEventListener('beforeunload', () => { disconnectWHEP_wf(); });
</script>
